<script>
/* ── 共享工具函数 Shared Utilities ── */

/**
 * formatPrizeLabel(tier, prizeType, prize)
 * 输出格式：{TIER大写} {类型}{金额.00} 或 {TIER大写} {类型}×{数量}
 * 例：B赏 彩金500.00 / LAST赏 彩金5000.00 / E赏 旋转券×20
 */
function formatPrizeLabel(tier, prizeType, prize) {
  let val;
  if (prizeType === '彩金' || prizeType === '积分') {
    const m = prize.match(/[\d,]+(?:\.\d+)?/);
    const num = m ? parseFloat(m[0].replace(/,/g, '')) : 0;
    val = prizeType + (prizeType === '彩金' ? num.toFixed(2) : num);
  } else {
    const m = prize.match(/×\s*(\d+)/);
    val = prizeType + (m ? '×' + m[1] : '');
  }
  return tier.toUpperCase() + ' ' + val;
}

/**
 * renderPrizes(prizes)
 * 同 prizeLabel 的多個獎品合併輸出，重複品項自動加 ×N
 * 例：[C赏 积分500.00, C赏 积分500.00, E赏 旋转券×20] → "C赏 积分500.00 ×2，E赏 旋转券×20"
 */
function renderPrizes(prizes) {
  const sorted = [...prizes].sort((a, b) => {
    const au = a.tier.toUpperCase();
    const bu = b.tier.toUpperCase();
    if (au.startsWith('LAST')) return -1;
    if (bu.startsWith('LAST')) return 1;
    const la = au.replace('赏', '');
    const lb = bu.replace('赏', '');
    return la < lb ? -1 : la > lb ? 1 : 0;
  });
  const labels = sorted.map(p => formatPrizeLabel(p.tier, p.prizeType, p.prize));
  const counts = {};
  labels.forEach(l => { counts[l] = (counts[l] || 0) + 1; });
  const seen = new Set();
  const result = [];
  labels.forEach(l => {
    if (!seen.has(l)) {
      seen.add(l);
      result.push(counts[l] > 1 ? l + ' ×' + counts[l] : l);
    }
  });
  return result.join('，');
}

function buildPageNums(cur, total) {
  if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
  const pages = [];
  if (cur <= 4) {
    for (let i = 1; i <= 5; i++) pages.push(i);
    pages.push('...'); pages.push(total);
  } else if (cur >= total - 3) {
    pages.push(1); pages.push('...');
    for (let i = total - 4; i <= total; i++) pages.push(i);
  } else {
    pages.push(1); pages.push('...');
    for (let i = cur - 1; i <= cur + 1; i++) pages.push(i);
    pages.push('...'); pages.push(total);
  }
  return pages;
}

<script>
/*
  备注栏显示规则：
  - 原因列：商品名称（如"苹果 Ichiban Kuji"）
  - 备注列：奖品列表，格式 {TIER大写} {类型}{值}，多个用逗号分隔
    彩金/积分  → B赏 彩金500.00
    数量类     → E赏 旋转券×20
*/
const P2_RECORDS = [
  {
    member: 'xnjobe3', time: '2026-06-16 09:53', points: -366, total: 481150,
    operator: 'SYSTEM',
    reason: '苹果 Ichiban Kuji',
    prizes: [
      { tier: 'A赏', prizeType: '免费旋转券', prize: '免费旋转券 × 20' },
      { tier: 'C赏', prizeType: '道具卡',     prize: '道具卡 × 3'       },
      { tier: 'E赏', prizeType: '旋转券',     prize: '旋转券 × 10'      },
    ]
  },
  {
    member: 'vivian01', time: '2026-06-15 17:22', points: -500, total: 316140,
    operator: 'SYSTEM',
    reason: '节日特别版 Ichiban Kuji',
    prizes: [
      { tier: 'B赏',    prizeType: '彩金',       prize: '彩金 50（1x Turnover）' },
      { tier: 'C赏',    prizeType: '积分',       prize: '积分 50'                },
      { tier: 'D赏',    prizeType: '积分',       prize: '积分 20'                },
      { tier: 'E赏',    prizeType: '免费旋转券', prize: '免费旋转券 × 10'         },
      { tier: 'Last赏', prizeType: '道具卡',     prize: '道具卡 × 3'              },
    ]
  },
  {
    member: 'vivian01', time: '2026-06-15 17:21', points: -1, total: 316640,
    operator: 'SYSTEM',
    reason: '盲盒美术图测试2',
    prizes: [
      { tier: 'C赏', prizeType: '积分', prize: '积分 50' },
    ]
  },
];

let p2Filtered = [...P2_RECORDS];
let p2Page = 1;
const P2_PAGE_SIZE = 10;

function p2RenderTable() {
  const member = document.getElementById('p2FilterMember').value.trim().toLowerCase();
  p2Filtered = P2_RECORDS.filter(r => {
    if (member && !r.member.toLowerCase().includes(member)) return false;
    return true;
  });
  p2Page = 1;
  p2RenderPage();
}

function p2RenderPage() {
  const start = (p2Page - 1) * P2_PAGE_SIZE;
  const rows  = p2Filtered.slice(start, start + P2_PAGE_SIZE);
  document.getElementById('p2TableBody').innerHTML = rows.map(r => `
    <tr>
      <td>${r.member}</td>
      <td>${r.time}</td>
      <td>${r.points > 0 ? '+' : ''}${r.points}</td>
      <td>${r.total}</td>
      <td>${r.operator}</td>
      <td>${r.reason}</td>
      <td>${renderPrizes(r.prizes)}</td>
    </tr>
  `).join('');
  p2RenderPagination();
}

function p2RenderPagination() {
  const total      = p2Filtered.length;
  const totalPages = Math.ceil(total / P2_PAGE_SIZE);
  const pg         = document.getElementById('p2Pagination');
  let html = `<span class="page-total">Total ${total}</span>`;
  html += `<div class="page-btn" onclick="p2GoPage(${p2Page-1})">‹</div>`;
  buildPageNums(p2Page, totalPages).forEach(p => {
    if (p === '...') html += `<div class="page-btn ellipsis">···</div>`;
    else html += `<div class="page-btn${p === p2Page ? ' active' : ''}" onclick="p2GoPage(${p})">${p}</div>`;
  });
  html += `<div class="page-btn" onclick="p2GoPage(${p2Page+1})">›</div>`;
  pg.innerHTML = html;
}

function p2GoPage(p) {
  const totalPages = Math.ceil(p2Filtered.length / P2_PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  p2Page = p;
  p2RenderPage();
}

p2RenderTable();
</script>

const PAGE_SIZE = 10;
let currentPage = 1;
let filteredData = [...RECORDS];

function qtyBadge(qty) {
  if (qty === '1')   return '单张';
  if (qty === '5')   return '五连';
  if (qty === 'all') return '全包';
  return qty;
}

function renderTable() {
  const coin      = document.getElementById('filterCoin').value;
  const member    = document.getElementById('filterMember').value.trim().toLowerCase();
  const product   = document.getElementById('filterProduct').value;
  const prizeType = document.getElementById('filterPrizeType').value;

  filteredData = RECORDS.filter(r => {
    if (coin      && r.coin !== coin)                           return false;
    if (member    && !r.member.toLowerCase().includes(member)) return false;
    if (product   && r.product !== product)                    return false;
    if (prizeType && !r.prizes.some(p => p.prizeType === prizeType)) return false;
    return true;
  });

  currentPage = 1;
  renderPage();
}

function renderPage() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const rows  = filteredData.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tableBody');

  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="order-no">${r.order}</td>
      <td>${r.member}</td>
      <td>${r.time}</td>
      <td>菲律宾比索</td>
      <td>${r.product}</td>
      <td>${qtyBadge(r.qty)}</td>
      <td><span class="points-val">${r.points}</span></td>
      <td>${renderPrizes(r.prizes)}</td>
    </tr>
  `).join('');

  renderPagination();
}

function renderPagination() {
  const total      = filteredData.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pg         = document.getElementById('pagination');

  let html = `<span class="page-total">Total ${total}</span>`;
  html += `<div class="page-btn" onclick="goPage(${currentPage-1})">‹</div>`;

  buildPageNums(currentPage, totalPages).forEach(p => {
    if (p === '...') {
      html += `<div class="page-btn ellipsis">···</div>`;
    } else {
      html += `<div class="page-btn${p === currentPage ? ' active' : ''}" onclick="goPage(${p})">${p}</div>`;
    }
  });

  html += `<div class="page-btn" onclick="goPage(${currentPage+1})">›</div>`;
  pg.innerHTML = html;
}

function goPage(p) {
  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderPage();
}
