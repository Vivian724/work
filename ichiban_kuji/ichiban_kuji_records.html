<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>一番赏抽奖记录</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  font-size: 14px;
  background: #f0f2f5;
  color: #333;
}

.page { padding: 24px; min-height: 100vh; }

/* ── BREADCRUMB ── */
.breadcrumb {
  font-size: 13px; color: #999; margin-bottom: 16px;
  display: flex; align-items: center; gap: 6px;
}
.breadcrumb span { color: #333; }

/* ── TABS ── */
.tab-bar {
  display: flex; border-bottom: 2px solid #f0f0f0;
  margin-bottom: 16px; gap: 0;
}
.tab-item {
  padding: 10px 20px; font-size: 14px; color: #666;
  cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -2px; transition: color 0.2s;
  white-space: nowrap;
}
.tab-item:hover { color: #1677ff; }
.tab-item.active { color: #1677ff; border-bottom-color: #1677ff; font-weight: 600; }

/* ── FILTER BAR ── */
.filter-bar {
  background: #fff; border-radius: 4px;
  padding: 14px 20px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
}
.filter-bar input[type="text"],
.filter-bar select {
  height: 32px; border: 1px solid #d9d9d9; border-radius: 4px;
  padding: 0 10px; font-size: 13px; color: #333; outline: none; background: #fff;
}
.filter-bar input[type="text"] { width: 160px; }
.filter-bar select { width: 130px; cursor: pointer; }
.filter-bar input:focus, .filter-bar select:focus { border-color: #1677ff; }

.date-range-wrap {
  display: flex; align-items: center; gap: 6px;
  border: 1px solid #d9d9d9; border-radius: 4px;
  padding: 0 10px; height: 32px; background: #fff;
}
.date-range-wrap input[type="datetime-local"] {
  border: none; outline: none; font-size: 13px; background: transparent;
  width: 148px; height: 28px; padding: 0;
}
.date-sep { color: #bbb; font-size: 13px; }
.date-icon { color: #bbb; font-size: 14px; }

.btn {
  padding: 6px 16px; border-radius: 4px; font-size: 13px;
  cursor: pointer; border: 1px solid transparent; height: 32px;
  display: inline-flex; align-items: center; gap: 6px; white-space: nowrap;
}
.btn-primary { background: #1677ff; color: #fff; border-color: #1677ff; }
.btn-primary:hover { background: #0958d9; }
.btn-warning { background: #fa8c16; color: #fff; border-color: #fa8c16; }
.btn-warning:hover { background: #d46b08; }

/* ── EXPORT ROW ── */
.action-row {
  display: flex; justify-content: flex-end;
  margin-bottom: 8px;
}

/* ── TABLE ── */
.table-wrap {
  background: #fff; border-radius: 4px; overflow: hidden;
}
table { width: 100%; border-collapse: collapse; }
thead tr { background: #fafafa; }
th {
  padding: 12px 16px; font-size: 13px; font-weight: 600;
  color: #555; text-align: left; border-bottom: 1px solid #f0f0f0;
  white-space: nowrap;
}
td {
  padding: 13px 16px; font-size: 13px; color: #333;
  border-bottom: 1px solid #f8f8f8; vertical-align: middle;
}
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafcff; }

/* ── TICKET QTY BADGE ── */
.qty-badge {
  display: inline-flex; align-items: center;
  padding: 2px 10px; border-radius: 12px; font-size: 12px; font-weight: 600;
}
.qty-1  { background: #f5f5f5; color: #666; border: 1px solid #e8e8e8; }
.qty-5  { background: #e6f4ff; color: #1677ff; border: 1px solid #91caff; }
.qty-all { background: #fff7e6; color: #fa8c16; border: 1px solid #ffd591; }

/* ── PRIZE TIER TAG ── */
.tier-tag {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 10px; font-size: 12px; font-weight: 600;
  background: #e6f4ff; color: #1677ff; border: 1px solid #91caff;
}
.tier-tag.last { background: #fff7e6; color: #fa8c16; border-color: #ffd591; }

/* ── PRIZE DETAIL ── */
.prize-detail { line-height: 1.6; }
.prize-name   { font-weight: 500; color: #1a1a1a; }
.prize-sub    { font-size: 12px; color: #999; margin-top: 2px; }

/* ── POINTS ── */
.points-val { font-weight: 600; color: #1a1a1a; }

/* ── ORDER NO ── */
.order-no { font-size: 12px; color: #666; font-family: monospace; }

/* ── PAGINATION ── */
.pagination {
  display: flex; align-items: center; justify-content: flex-end;
  padding: 14px 20px; gap: 4px; border-top: 1px solid #f0f0f0;
}
.page-total { font-size: 13px; color: #999; margin-right: 8px; }
.page-btn {
  min-width: 32px; height: 32px; border: 1px solid #d9d9d9;
  background: #fff; border-radius: 4px; font-size: 13px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; padding: 0 8px;
}
.page-btn:hover { border-color: #1677ff; color: #1677ff; }
.page-btn.active { background: #1677ff; border-color: #1677ff; color: #fff; }
.page-btn.ellipsis { border: none; cursor: default; color: #999; }
.page-btn.ellipsis:hover { color: #999; border: none; }
</style>
</head>
<body>
<div class="page">

  <!-- 面包屑 -->
  <div class="breadcrumb">
    位置 › <span>商品兑换记录</span>
  </div>

  <!-- 标签页 -->
  <div class="tab-bar">
    <div class="tab-item">商品兑换记录</div>

  <!-- 筛选栏 -->
  <div class="filter-bar">
    <select id="filterCoin">
      <option value="">选择币别</option>
      <option value="PHP">菲律宾比索 (PHP)</option>
      <option value="TWD">台币 (TWD)</option>

    <input type="text" id="filterMember" placeholder="会员名">

    <div class="date-range-wrap">
      <span class="date-icon">🕐</span>
      <input type="datetime-local" id="dateStart" value="2026-06-08T00:00">
      <span class="date-sep">～</span>

    </div>

    <select id="filterProduct">
      <option value="">全部商品</option>
      <option>苹果一番赏</option>
      <option>节日特别版一番赏</option>

    <select id="filterPrizeType">
      <option value="">全部奖品</option>
      <option value="彩金">彩金</option>
      <option value="积分">积分</option>
      <option value="旋转券">旋转券</option>
      <option value="免费旋转券">免费旋转券</option>
      <option value="免费投注券">免费投注券</option>
      <option value="道具卡">道具卡</option>
    </select>

    <button class="btn btn-primary" onclick="renderTable()">
      <svg viewBox="0 0 1024 1024" width="13" height="13" fill="currentColor"><path d="M909.6 854.5L649.9 594.8C690.2 542.7 712 479 712 412c0-80.2-31.3-155.4-87.9-212.1-56.6-56.7-132-87.9-212.1-87.9s-155.5 31.3-212.1 87.9C143.2 256.5 112 331.8 112 412c0 80.1 31.3 155.5 87.9 212.1C256.5 680.8 331.8 712 412 712c67 0 130.6-21.8 182.7-62l259.7 259.6a8.2 8.2 0 0011.6 0l43.6-43.5a8.2 8.2 0 000-11.6zM570.4 570.4C528 612.7 471.8 636 412 636s-116-23.3-158.4-65.6C211.3 528 188 471.8 188 412s23.3-116.1 65.6-158.4C296 211.3 352.2 188 412 188s116.1 23.3 158.4 65.6S636 352.2 636 412s-23.3 116.1-65.6 158.4z"/></svg>
      搜索
    </button>
  </div>

  <!-- 导出 -->
  <div class="action-row">
    <button class="btn btn-warning">导出</button>
  </div>

  <!-- 表格 -->
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>订单号</th>
          <th>会员名</th>
          <th>创建时间</th>
          <th>币种</th>
          <th>商品名称</th>
          <th>券数</th>
          <th>一番赏奖品</th>
          <th>积分</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
    <div class="pagination" id="pagination"></div>
  </div>

</div>

<script>
const RECORDS = [
  { order:'PR605996359563974932', member:'okbet9994fg5vz', time:'2026-06-12 16:45', coin:'PHP', product:'苹果一番赏',        qty:'all', tier:'Last赏', prizeType:'彩金',      prize:'彩金 Cash 5000（1x Turnover）',  points:288 },
  { order:'PR605840546270849300', member:'okbet04597i9j3', time:'2026-06-11 20:05', coin:'PHP', product:'苹果一番赏',        qty:'5',   tier:'A赏',   prizeType:'彩金',      prize:'彩金 Cash 5000（1x Turnover）',  points:1   },
  { order:'PR605830768509364500', member:'vivian01',       time:'2026-06-11 18:27', coin:'TWD', product:'节日特别版一番赏',  qty:'1',   tier:'B赏',   prizeType:'彩金',      prize:'彩金 500（1x Turnover）',         points:100 },
  { order:'PR605830753728637204', member:'vivian01',       time:'2026-06-11 18:27', coin:'TWD', product:'节日特别版一番赏',  qty:'1',   tier:'C赏',   prizeType:'积分',      prize:'积分 500',                         points:100 },
  { order:'PR605830739937765652', member:'vivian01',       time:'2026-06-11 18:27', coin:'TWD', product:'节日特别版一番赏',  qty:'1',   tier:'D赏',   prizeType:'积分',      prize:'积分 200',                         points:100 },
  { order:'PR605828198642526484', member:'vivian01',       time:'2026-06-11 18:02', coin:'CNY', product:'高价值VIP专属赏',  qty:'5',   tier:'A赏',   prizeType:'彩金',      prize:'彩金 ¥5000（2x Turnover）',      points:500 },
  { order:'PR605828183543032084', member:'vivian01',       time:'2026-06-11 18:02', coin:'CNY', product:'高价值VIP专属赏',  qty:'5',   tier:'E赏',   prizeType:'旋转券',    prize:'旋转券 × 20',                     points:500 },
  { order:'PR605820423443097876', member:'vivian01',       time:'2026-06-11 16:45', coin:'PHP', product:'苹果一番赏',        qty:'1',   tier:'B赏',   prizeType:'免费旋转券',prize:'免费旋转券 × 10',                 points:1   },
  { order:'PR605817703537617172', member:'vivian01',       time:'2026-06-11 16:18', coin:'PHP', product:'苹果一番赏',        qty:'1',   tier:'C赏',   prizeType:'免费投注券',prize:'免费投注券 × 5',                  points:1   },
  { order:'PR605817154788436244', member:'vivian01',       time:'2026-06-11 16:12', coin:'TWD', product:'节日特别版一番赏',  qty:'all', tier:'Last赏', prizeType:'道具卡',    prize:'道具卡 × 3',                      points:100 },
  { order:'PR605800234891723001', member:'player_tom88',   time:'2026-06-11 14:30', coin:'PHP', product:'高价值VIP专属赏',  qty:'5',   tier:'A赏',   prizeType:'彩金',      prize:'彩金 1000（2x Turnover）',        points:200 },
  { order:'PR605799812345678900', member:'player_tom88',   time:'2026-06-11 14:28', coin:'PHP', product:'高价值VIP专属赏',  qty:'5',   tier:'F赏',   prizeType:'旋转券',    prize:'旋转券 × 10',                     points:200 },
  { order:'PR605780001122334455', member:'alice_vip3',     time:'2026-06-11 10:05', coin:'CNY', product:'入门款一番赏',      qty:'1',   tier:'D赏',   prizeType:'积分',      prize:'积分 200',                         points:50  },
  { order:'PR605770099887766554', member:'alice_vip3',     time:'2026-06-10 22:40', coin:'CNY', product:'入门款一番赏',      qty:'all', tier:'Last赏', prizeType:'免费旋转券',prize:'免费旋转券 × 20',                 points:50  },
  { order:'PR605760123456789012', member:'jay_pm',         time:'2026-06-10 18:15', coin:'TWD', product:'苹果一番赏',        qty:'5',   tier:'G赏',   prizeType:'道具卡',    prize:'道具卡 × 2',                      points:200 },
  { order:'PR605750987654321098', member:'jay_pm',         time:'2026-06-10 15:00', coin:'TWD', product:'苹果一番赏',        qty:'1',   tier:'A赏',   prizeType:'彩金',      prize:'彩金 NT$3000（3x）',              points:200 },
  { order:'PR605740112233445566', member:'user_beta01',    time:'2026-06-10 11:22', coin:'CNY', product:'节日特别版一番赏',  qty:'1',   tier:'B赏',   prizeType:'免费投注券',prize:'免费投注券 × 8',                  points:300 },
  { order:'PR605730223344556677', member:'user_beta01',    time:'2026-06-09 20:10', coin:'CNY', product:'节日特别版一番赏',  qty:'5',   tier:'E赏',   prizeType:'免费旋转券',prize:'免费旋转券 × 30',                 points:300 },
  { order:'PR605720334455667788', member:'olivia_admin',   time:'2026-06-09 14:33', coin:'TWD', product:'高价值VIP专属赏',  qty:'1',   tier:'C赏',   prizeType:'道具卡',    prize:'道具卡 × 5',                      points:500 },
  { order:'PR605710445566778899', member:'olivia_admin',   time:'2026-06-08 09:00', coin:'CNY', product:'高价值VIP专属赏',  qty:'all', tier:'Last赏', prizeType:'彩金',      prize:'彩金 ¥10000（3x Turnover）',     points:500 },
];

const PAGE_SIZE = 10;
let currentPage = 1;
let filteredData = [...RECORDS];

function qtyBadge(qty) {
  if (qty === '1')   return `<span class="qty-badge qty-1">单张</span>`;
  if (qty === '5')   return `<span class="qty-badge qty-5">五连</span>`;
  if (qty === 'all') return `<span class="qty-badge qty-all">全包</span>`;
  return qty;
}

function tierTag(tier) {
  const isLast = tier === 'Last赏';
  return `<span class="tier-tag${isLast ? ' last' : ''}">${tier}</span>`;
}

function renderTable() {
  const coin    = document.getElementById('filterCoin').value;
  const member  = document.getElementById('filterMember').value.trim().toLowerCase();
  const product    = document.getElementById('filterProduct').value;
  const prizeType  = document.getElementById('filterPrizeType').value;

  filteredData = RECORDS.filter(r => {
    if (coin       && r.coin !== coin)                              return false;
    if (member     && !r.member.toLowerCase().includes(member))    return false;
    if (product    && r.product !== product)                       return false;
    if (prizeType  && r.prizeType !== prizeType)                   return false;
    return true;
  });

  currentPage = 1;
  renderPage();
}

function renderPage() {
  const start = (currentPage - 1) * PAGE_SIZE;
  const rows  = filteredData.slice(start, start + PAGE_SIZE);
  const tbody = document.getElementById('tableBody');

  tbody.innerHTML = rows.map(r => `
    <tr>
      <td class="order-no">${r.order}</td>
      <td>${r.member}</td>
      <td>${r.time}</td>
      <td>${r.coin}</td>
      <td>${r.product}</td>
      <td>${qtyBadge(r.qty)}</td>
      <td>
        <div class="prize-detail">
          <div style="display:flex;align-items:center;gap:6px;">
            ${tierTag(r.tier)}
            <span class="prize-name">${r.prize}</span>
          </div>
        </div>
      </td>
      <td><span class="points-val">${r.points}</span></td>
    </tr>
  `).join('');

  renderPagination();
}

function renderPagination() {
  const total     = filteredData.length;
  const totalPages = Math.ceil(total / PAGE_SIZE);
  const pg         = document.getElementById('pagination');

  let html = `<span class="page-total">Total ${total}</span>`;
  html += `<div class="page-btn" onclick="goPage(${currentPage-1})">‹</div>`;

  const pages = buildPageNums(currentPage, totalPages);
  pages.forEach(p => {
    if (p === '...') {
      html += `<div class="page-btn ellipsis">···</div>`;
    } else {
      html += `<div class="page-btn${p === currentPage ? ' active' : ''}" onclick="goPage(${p})">${p}</div>`;
    }
  });

  html += `<div class="page-btn" onclick="goPage(${currentPage+1})">›</div>`;
  pg.innerHTML = html;
}

function buildPageNums(cur, total) {
  if (total <= 7) return Array.from({length: total}, (_, i) => i + 1);
  const pages = [];
  if (cur <= 4) {
    for (let i = 1; i <= 5; i++) pages.push(i);
    pages.push('...'); pages.push(total);
  } else if (cur >= total - 3) {
    pages.push(1); pages.push('...');
    for (let i = total - 4; i <= total; i++) pages.push(i);
  } else {
    pages.push(1); pages.push('...');
    for (let i = cur - 1; i <= cur + 1; i++) pages.push(i);
    pages.push('...'); pages.push(total);
  }
  return pages;
}

function goPage(p) {
  const totalPages = Math.ceil(filteredData.length / PAGE_SIZE);
  if (p < 1 || p > totalPages) return;
  currentPage = p;
  renderPage();
}

// 初始化
renderTable();
</script>
</body>
</html>
