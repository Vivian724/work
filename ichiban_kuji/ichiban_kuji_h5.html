<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ICHIBAN KUJI H5</title>
<style>
/* ============================================================
   日系·和纸风一番赏 H5  ── A 单列 / B 双列，两台并排同时显示
   ============================================================ */
:root{
  --paper:#F1E9D6; --fuda:#FBF6EA; --sumi:#2A2723; --sumi-2:#6B6256;
  --shu:#C6362F; --shu-d:#9C2A22; --kin:#B08A3C; --kin-d:#8c6a26; --ai:#33506A;
  --line:#E0D5BC; --line-2:#D2C4A4; --img:64px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Hiragino Sans","Microsoft YaHei",sans-serif;
  background:#332e2a;color:var(--sumi);padding:24px 12px}
.serif{font-family:"Songti SC","Hiragino Mincho ProN","STSong",serif}

.stage{display:flex;flex-wrap:wrap;gap:28px;justify-content:center;align-items:flex-start}
.col{display:flex;flex-direction:column;align-items:center;gap:10px}
.vlabel{color:#F1E9D6;font-size:14px;letter-spacing:3px;background:rgba(198,54,47,.9);padding:6px 18px;border-radius:20px}
.vlabel small{opacity:.8;letter-spacing:1px;font-size:11px;margin-left:4px}

.device{width:390px;max-width:94vw;min-height:880px;background:var(--paper);position:relative;border-radius:6px;overflow:hidden;
  background-image:
    repeating-linear-gradient(0deg,rgba(0,0,0,.012) 0 1px,transparent 1px 4px),
    repeating-linear-gradient(90deg,rgba(0,0,0,.012) 0 1px,transparent 1px 4px)}

/* 顶栏 */
.topbar{display:flex;align-items:center;gap:10px;padding:11px 16px}
.icon-btn{width:30px;height:30px;border:1px solid var(--line-2);border-radius:50%;background:var(--fuda);color:var(--sumi-2);font-size:15px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.topbar .title{flex:1;text-align:center;font-size:15px;letter-spacing:4px}
.pts-pill{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--shu-d);background:#fff;border:1px solid var(--line-2);border-radius:14px;padding:3px 10px;white-space:nowrap}
.pts-pill b{font-size:13px} .pts-pill .star{color:var(--kin)}

/* BANNER */
.banner{position:relative}
.kv{height:142px;position:relative;overflow:hidden;background:repeating-linear-gradient(45deg,#E7DEC8 0 11px,#E1D7BC 11px 22px)}
.kv .kv-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--sumi-2);font-size:12px;text-align:center;gap:3px;letter-spacing:1px}
.kv .kv-ph small{font-size:10px;opacity:.7}
.kv .scrim{position:absolute;left:0;right:0;bottom:0;height:84px;background:linear-gradient(transparent,rgba(42,39,35,.62))}
.kv .nobori{position:absolute;top:10px;left:12px;writing-mode:vertical-rl;text-orientation:upright;background:var(--shu);color:#fff;font-size:14px;letter-spacing:3px;padding:6px 4px;border-radius:3px;box-shadow:1px 1px 0 var(--shu-d);z-index:2}
.noren-edge{height:14px;background:radial-gradient(circle 9px at 12px -1px,var(--shu) 70%,transparent 72%) repeat-x;background-size:24px 14px}
.b-stock{padding:9px 16px 11px;border-bottom:1px solid var(--line);background:#F6EFDD}
.b-stock .r1{display:flex;justify-content:space-between;align-items:baseline;font-size:11px;color:var(--sumi-2)}
.b-stock .r1 b{font-family:"Songti SC",serif;font-size:18px;color:var(--shu);margin-right:1px}
.stock-bar{height:6px;background:#E7DcC4;border:1px solid var(--line-2);border-radius:4px;overflow:hidden;margin-top:5px}
.stock-fill{height:100%;background:repeating-linear-gradient(45deg,var(--shu) 0 6px,var(--shu-d) 6px 12px)}

/* 撕券台 */
.draw-zone{padding:14px 16px 16px;border-bottom:1px solid var(--line);background:linear-gradient(180deg,#F6EFDD,var(--paper))}
.seg{display:flex;gap:6px;margin-bottom:11px}
.seg button{flex:1;background:#fff;border:1px solid var(--line-2);color:var(--sumi-2);border-radius:5px;padding:8px 0;font-size:13px;cursor:pointer;font-family:"Songti SC",serif;white-space:nowrap}
.seg button .x{font-size:10px;opacity:.7}
.seg button.on{background:var(--sumi);color:#fff;border-color:var(--sumi)}
.seg button.all{border-color:var(--kin);color:var(--kin-d)}
.seg button.all.on{background:linear-gradient(135deg,#C9A24B,#9c7a2c);color:#fff;border-color:var(--kin-d)}
.seg button:disabled{background:#f1ede6;color:#b8ada0;border-color:#e4ded4;cursor:not-allowed}
.ticket-btn{width:100%;border:none;cursor:pointer;display:flex;align-items:stretch;background:var(--shu);color:#fff;border-radius:7px;overflow:hidden;box-shadow:0 2px 0 var(--shu-d);padding:0}
.ticket-btn:active{transform:translateY(1px);box-shadow:0 1px 0 var(--shu-d)}
.ticket-btn .stub{flex:0 0 84px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px 6px;border-right:2px dashed rgba(255,255,255,.55);background:rgba(0,0,0,.08)}
.ticket-btn .stub .s1{font-size:10px;letter-spacing:2px;opacity:.9}
.ticket-btn .stub .s2{font-family:"Songti SC",serif;font-size:16px;margin-top:3px}
.ticket-btn .main{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:12px}
.ticket-btn .main .t1{font-size:11px;letter-spacing:3px;opacity:.9}
.ticket-btn .main .t2{font-family:"Songti SC",serif;font-size:19px;font-weight:700;letter-spacing:2px;margin-top:3px}
.ticket-btn .main .t2 small{font-size:12px;font-weight:400;opacity:.9}
.ticket-btn .main .t2.state{font-size:15px;letter-spacing:.5px;white-space:nowrap}
.ticket-btn[disabled]{background:#b3a69a;box-shadow:0 2px 0 #968a7d;cursor:not-allowed}
.dz-foot{display:flex;justify-content:space-between;margin-top:9px;font-size:11px;color:var(--sumi-2)}
.dz-foot .mine b{color:var(--sumi);font-size:12px}

/* 规则按钮（banner右下角） */
.kv-rules{position:absolute;bottom:10px;right:10px;z-index:3;border:none;border-radius:14px;background:rgba(255,255,255,.88);color:var(--sumi-2);font-size:11px;font-weight:600;padding:5px 11px;cursor:pointer;display:flex;align-items:center;gap:4px;white-space:nowrap;font-family:inherit;box-shadow:0 2px 6px rgba(0,0,0,.2)}
.kv-rules:active{background:#fff}
/* 规则弹窗 */
.rules-ov{position:absolute;inset:0;background:rgba(42,39,35,.75);z-index:60;display:none;align-items:flex-start;justify-content:center;padding:80px 24px 24px}
.rules-ov.show{display:flex}
.rules-box{background:var(--paper);border-radius:10px;width:100%;max-height:80%;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--kin)}
.rules-hd{display:flex;align-items:center;justify-content:space-between;padding:13px 16px 11px;border-bottom:1px solid var(--line)}
.rules-htitle{font-size:14px;letter-spacing:4px}
.rules-bd{overflow-y:auto;padding:12px 16px 16px}
.rules-row{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.rules-row:last-child{border:none;padding-bottom:0}
.rules-row:first-child{padding-top:0}
.rules-dot{width:18px;height:18px;border-radius:50%;flex-shrink:0;margin-top:2px;background:rgba(198,54,47,.08);border:1px solid rgba(198,54,47,.22);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--shu);font-weight:700}
.rules-txt{font-size:11.5px;color:var(--sumi-2);line-height:1.7}
.rules-txt b{color:var(--sumi)}
.rules-sec-title{font-size:12px;font-weight:700;letter-spacing:1.5px;color:var(--shu-d);margin:16px 0 4px;text-transform:uppercase}
.rules-sec-title:first-child{margin-top:0}
/* 新撕券区 */
.tkt-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:8px}
.tkt-card{border:none;cursor:pointer;border-radius:7px;background:var(--shu);color:#fff;box-shadow:0 2px 0 var(--shu-d);padding:9px 12px;display:flex;flex-direction:column;align-items:center;gap:3px;position:relative;overflow:hidden;font-family:inherit}
.tkt-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:rgba(255,255,255,.25)}
.tkt-card:active{transform:translateY(1px);box-shadow:0 1px 0 var(--shu-d)}
.tkt-card .tc-n{font-family:"Songti SC",serif;font-size:16px;font-weight:700;line-height:1}
.tkt-card .tc-cost{font-size:10px;opacity:.8}
.tkt-card.all{background:linear-gradient(135deg,#C9A24B,#9c7a2c)}
.tkt-card.on{box-shadow:0 0 0 2.5px rgba(255,255,255,.9),0 0 0 4.5px var(--shu-d),0 2px 0 var(--shu-d)}
.tkt-card.all.on{box-shadow:0 0 0 2.5px rgba(255,255,255,.9),0 0 0 4.5px var(--kin-d),0 2px 0 var(--kin-d)}
.tkt-card[disabled]{background:#b3a69a;box-shadow:none;cursor:not-allowed}
.tear-main{width:100%;border:none;cursor:pointer;background:var(--sumi);color:#fff;border-radius:7px;padding:10px;box-shadow:0 2px 0 #1a1714;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit}
.tear-main:active{transform:translateY(1px);box-shadow:0 1px 0 #1a1714}
.tear-main .tm-lbl{font-family:"Songti SC",serif;font-size:14px;letter-spacing:2px}
.tear-main small{font-size:11px;opacity:.8}
.tear-main[disabled]{background:#b3a69a;box-shadow:none;cursor:not-allowed}

/* 奖品一览 */
.pool{padding:14px 16px 24px}
.noren{display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:13px}
.noren::before,.noren::after{content:"";flex:1;height:0;border-top:2px solid var(--line-2)}
.noren .band{background:var(--shu);color:#fff;font-size:14px;letter-spacing:6px;padding:5px 18px;border-radius:3px;box-shadow:0 2px 0 var(--shu-d)}

/* 赏别章 */
.seal2{flex-shrink:0;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:34px;height:34px;border-radius:6px;background:var(--shu);color:#fff;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.4)}
.seal2 .a{font-family:"Songti SC",serif;font-size:15px;font-weight:700;line-height:1}
.seal2 .s{font-size:8px;opacity:.9;margin-top:1px;letter-spacing:.5px}
.seal2.gold{background:linear-gradient(135deg,#D9B45A,#9c7a2c);box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.55),0 0 0 2px rgba(201,162,75,.25)}

/* 图位 */
.ph{background:repeating-linear-gradient(45deg,#EEE6D0 0 8px,#E9E0C8 8px 16px);border:1px solid var(--line-2);border-radius:7px;display:flex;align-items:center;justify-content:center;color:var(--sumi-2);font-size:9px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.ic{border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;box-shadow:0 1px 3px rgba(0,0,0,.08)}

/* B 版双列 */
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;align-items:stretch}
.gfeat{grid-column:1/-1;display:flex;gap:13px;align-items:center;background:linear-gradient(135deg,#FBF3DC,#F3E4B8);border:1.5px solid var(--kin);border-radius:9px;padding:12px;position:relative;overflow:hidden;box-shadow:0 3px 14px rgba(176,138,60,.3);margin-bottom:2px}
.gfeat::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 90% 8%,rgba(255,240,200,.6),transparent 40%)}
.gfeat .g-img{background:#fff;border:1px solid var(--line-2);border-radius:9px;padding:6px;box-shadow:0 1px 5px rgba(0,0,0,.07);flex-shrink:0;z-index:2}
.gfeat .g-img .ph,.gfeat .g-img .ic{width:120px;height:120px;flex-shrink:0;box-shadow:none}
.gfeat .g-img .ic span{font-size:50px}
.gfeat .info{flex:1;min-width:0;display:flex;flex-direction:column;gap:5px;z-index:2}
.gfeat .f-name{font-size:17px;font-weight:700;line-height:1.2}
.gfeat .f-type{font-size:11px;color:var(--ai);border:1px solid var(--ai);border-radius:3px;padding:0 6px;align-self:flex-start}
.gfeat .f-desc{font-size:11px;color:var(--sumi-2);line-height:1.35}
.gfeat .f-note{font-size:11px;color:var(--kin-d)}
.gfeat .f-zan{font-size:11px;color:var(--sumi-2);margin-top:3px;padding-top:7px;border-top:1px dashed rgba(176,138,60,.45)}
.gfeat .f-zan b{font-family:"Songti SC",serif;font-size:20px;color:var(--shu)}
.gfeat .r-ribbon{position:absolute;top:0;right:0;background:linear-gradient(135deg,#D9B45A,#9c7a2c);color:#fff;font-size:10px;letter-spacing:1px;padding:3px 11px;border-radius:0 0 0 8px;z-index:3}
.gcard{background:var(--fuda);border:1px solid var(--line-2);border-radius:9px;padding:8px;position:relative;overflow:hidden;height:100%;display:flex;flex-direction:column}
.gcard.sold{filter:grayscale(.35)}
.gcard.sold::before{content:'';position:absolute;inset:0;background:rgba(238,231,219,.7);z-index:4;border-radius:inherit;pointer-events:auto}
.gcard.hi{border:1.5px solid var(--kin);background:linear-gradient(160deg,#FDF6E1,#F4E6BD);box-shadow:0 3px 12px rgba(176,138,60,.28)}
.gcard.hi::after{content:"";position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 92% 6%,rgba(255,242,205,.75),transparent 38%)}
.gcard.mid{border:1px solid #E3CF9A;background:#FBF7EC}
.gcard .midtag{font-size:9px;color:var(--kin-d);border:1px solid #D9B45A;background:#fff;border-radius:3px;padding:1px 5px;position:relative;z-index:2;white-space:nowrap}
.gcard .g-top{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:5px}
.gcard .g-tagrow{min-height:16px;display:flex;align-items:center;margin-bottom:8px}
.gcard .g-zan{display:flex;align-items:baseline;gap:2px;white-space:nowrap}
.gcard .g-zan .lbl{font-size:10px;color:var(--sumi-2)}
.gcard .g-zan .num{font-family:"Songti SC",serif;font-size:19px;font-weight:700;color:var(--sumi)}
.gcard .g-zan .tot{font-size:10px;color:var(--sumi-2)}
.gcard .g-img{margin-bottom:7px;display:flex;justify-content:center}
.gcard .g-img .ph,.gcard .g-img .ic{width:112px;height:112px}
.gcard .g-img .ic span{font-size:44px}
.gcard .g-name{font-size:12.5px;font-weight:600;line-height:1.3;min-height:32px}
.gcard .g-type{font-size:10px;color:var(--ai);margin-top:auto;padding-top:2px}
.gcard .g-desc{font-size:10px;color:var(--sumi-2);margin-top:2px;line-height:1.3}
.gcard .uptag{font-size:9px;color:#fff;background:linear-gradient(135deg,#D9B45A,#9c7a2c);border:none;border-radius:3px;padding:1px 6px;position:relative;z-index:2;white-space:nowrap}


/* 弹窗（置中）*/
.overlay{position:absolute;inset:0;background:rgba(42,39,35,.78);display:none;align-items:flex-start;justify-content:center;padding:430px 24px 8px;z-index:50}
.overlay.show{display:flex}
.result{background:var(--paper);border-radius:10px;width:100%;max-height:440px;display:flex;flex-direction:column;overflow:hidden;border:1px solid var(--kin)}
.result-head{text-align:center;padding:11px 16px 7px;font-size:15px;letter-spacing:3px}
.result-body{overflow-y:auto;padding:4px 10px 8px}
.last-hit{background:linear-gradient(135deg,#D9B45A,#9c7a2c);color:#fff;text-align:center;padding:9px;font-size:13px;letter-spacing:3px;margin-bottom:10px;border-radius:5px}
.rk-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.rk{position:relative;border:1px solid var(--line-2);border-radius:7px;margin-bottom:0;overflow:hidden;min-height:54px;background:var(--fuda)}
.rk .reveal{display:flex;align-items:center;gap:8px;padding:8px 9px}
.rk .rseal{flex-shrink:0;display:inline-flex;flex-direction:column;align-items:center;justify-content:center;width:38px;height:38px;border-radius:6px;background:var(--shu);color:#fff;box-shadow:inset 0 0 0 2px rgba(255,255,255,.45)}
.rk .rseal .a{font-family:"Songti SC",serif;font-size:16px;font-weight:700;line-height:1}
.rk .rseal .s{font-size:7px;opacity:.9;margin-top:1px;letter-spacing:.5px}
.rk .rseal.gold{background:linear-gradient(135deg,#D9B45A,#9c7a2c);box-shadow:inset 0 0 0 2px rgba(255,255,255,.55),0 0 0 3px rgba(201,162,75,.3)}
.rk .reveal .r-txt{flex:1;min-width:0}
.rk .reveal .nm{font-size:12px;font-weight:700;line-height:1.25}
.rk .reveal .ty{font-size:10px;color:var(--sumi-2);margin-top:2px}
.rk .reveal .r-pic{background:#fff;border:1px solid var(--line-2);border-radius:8px;padding:4px;box-shadow:0 1px 4px rgba(0,0,0,.07);flex-shrink:0}
.rk .reveal .r-pic .ph,.rk .reveal .r-pic .ic{width:46px;height:46px;box-shadow:none}
.rk .reveal .r-pic .ic span{font-size:24px}
.rk .cover{position:absolute;inset:0;background:var(--sumi);color:#fff;display:flex;align-items:center;justify-content:center;gap:6px;font-family:"Songti SC",serif;font-size:11px;letter-spacing:2px;z-index:2;border-left:3px dashed rgba(255,255,255,.55);clip-path:inset(0 0 0 0);transition:clip-path 1.1s ease}
.rk.torn .cover{clip-path:inset(0 0 0 100%)}
.rk .cover .arrow{font-size:13px;opacity:.85}
.sum-row{display:flex;align-items:center;gap:10px;background:var(--fuda);border:1px solid var(--line-2);border-radius:7px;padding:9px 12px;margin-bottom:8px}
.sum-row .ph,.sum-row .ic{width:40px;height:40px;flex-shrink:0} .sum-row .ic span{font-size:20px}
.sum-row .nm{flex:1;font-size:13px;font-weight:600;display:flex;align-items:center;gap:6px}
.sum-row .cnt{font-family:"Songti SC",serif;font-size:18px;font-weight:700;color:var(--shu)}
.result-foot{padding:12px 16px 16px;border-top:1px solid var(--line)}
.btn-ok{width:100%;background:var(--sumi);color:#fff;border:none;border-radius:6px;padding:11px;font-size:14px;letter-spacing:3px;cursor:pointer;font-family:"Songti SC",serif}
@media (prefers-reduced-motion:reduce){.rk .cover{transition:none}}
</style>
</head>
<body>
<div class="stage">
  <div class="col"><div class="device" id="dev-B"></div></div>
</div>

<script>
/* ── 共用资料 ── */
const ART={
  bonus:{kind:'icon',glyph:'₱',bg:'#FCEBD6',fg:'#C9761E'},
  point:{kind:'icon',glyph:'★',bg:'#FADBDA',fg:'#C13B36'},
  spintok:{kind:'icon',glyph:'↻',bg:'#D8EEEC',fg:'#246E69'},
  freespin:{kind:'icon',glyph:'⟳',bg:'#FBE4D2',fg:'#B85F1F'},
  freebet:{kind:'icon',glyph:'＄',bg:'#EBE0F7',fg:'#6238A8'},
  tool:{kind:'icon',glyph:'▤',bg:'#DEEAF8',fg:'#2E5DA0'},
  physical:{kind:'photo'},
};
const TIERS=[
  {sho:'S',name:'招财猫 铂金典藏摆件',type:'Physical Item',desc:'限量镀铂工艺，附收藏编号证书，全球限量999台',art:'physical',total:1,left:1,hi:true},
  {sho:'A',name:'招财猫 大号公仔',type:'Physical Item',desc:'陶瓷材质，高约30cm，附赠专属收藏证书',art:'physical',total:2,left:1,hi:true},
  {sho:'B',name:'5,000.00',type:'E-Credit',art:'bonus',total:5,left:2,mid:true},
  {sho:'C',name:'J Mania Triple Jam',type:'Free Spins',art:'freespin',total:8,left:4,mid:true},
  {sho:'D',name:'MiniG Free Bet',type:'Free Bet',art:'freebet',total:10,left:5},
  {sho:'E',name:'免费旋转 ×10',type:'Free Spins',art:'spintok',total:12,left:6},
  {sho:'F',name:'1,000',type:'Points',art:'point',total:15,left:8},
  {sho:'G',name:'加倍卡',type:'Voucher',art:'tool',total:20,left:11},
  {sho:'H',name:'1,000.00',type:'E-Credit',art:'bonus',total:27,left:12},
];
const LAST={sho:'楽',name:'招财猫 黄金开运摆件',type:'Physical Item',desc:'限量典藏版，镀金工艺，附精美礼盒包装',art:'physical',total:1,left:1};
const COST=95;

function artImg(key){const a=ART[key];return a.kind==='photo'
  ?`<div class="ph">Item Photo</div>`
  :`<div class="ic" style="background:${a.bg}"><span style="color:${a.fg}">${a.glyph}</span></div>`;}
function badge(t,isLast,gold){return isLast
  ?`<span class="seal2 gold serif"><span class="s">LAST</span></span>`
  :`<span class="seal2 ${gold?'gold':''} serif"><span class="a">${t.sho}</span><span class="s">Tier</span></span>`;}
function revealBadge(t,isLast){return isLast
  ?`<span class="rseal gold serif"><span class="s">LAST</span></span>`
  :`<span class="rseal serif"><span class="a">${t.sho}</span><span class="s">Tier</span></span>`;}

      <div class="rules-row"><div class="rules-dot">2</div><div class="rules-txt">This campaign uses an inventory-based random draw mechanism. Each draw will be randomly selected from the prizes that still have remaining stock in the current prize group.</div></div>
      <div class="rules-row"><div class="rules-dot">3</div><div class="rules-txt">The winning probability of each prize is based on its current remaining inventory proportion within the total remaining inventory of the prize group.</div></div>

      <div class="rules-row"><div class="rules-dot">6</div><div class="rules-txt">OKBet retains the right to modify, suspend, or terminate this promotion without prior notice, subject to PAGCOR approval where applicable.</div></div>

  <div class="overlay js-overlay"><div class="result">

    <div class="result-head serif">All Prizes Drawn</div>

      All prizes in Ichiban Lucky Draw have been drawn. Explore more rewards in the Points Mall.
    </div>
    <div class="result-foot"><button class="btn-ok js-soldout-ok">Got It</button></div></div></div>
  <div class="overlay js-stock-overlay"><div class="result">
    <div class="result-head serif">Insufficient Stock</div>
    <div class="result-body" style="text-align:center;padding:28px 10px 8px;color:#5c4a38;font-size:14.5px;line-height:1.9;">
      "<span class="js-stock-n">5</span> Draws" is no longer available. Please select another option.

function createApp(rootId){
  const root=document.getElementById(rootId);
  root.innerHTML=deviceHTML();
  const $=s=>root.querySelector(s);
  const tiers=TIERS.map(t=>({...t})); const last={...LAST};
  let points=316149, drawN=1;

  const normalLeft=()=>tiers.reduce((s,t)=>s+t.left,0);
  const normalTotal=()=>tiers.reduce((s,t)=>s+t.total,0);
  const totalLeft=()=>normalLeft()+last.left; // 用于「是否全部售罄」判断（含 LAST），不用于顶部进度条显示
  const curN=()=>drawN==='all'?normalLeft():drawN;

  function featB(t,ribbon,note){const isPhysical=t.art==='physical';
    return `<div class="gfeat"><div class="r-ribbon serif">${ribbon}</div>
    <div class="g-img">${artImg(t.art)}</div><div class="info">${badge(t,true)}
      <div class="f-name serif">Last Prize · ${t.name}</div>${isPhysical
        ?`<div class="f-desc">${t.desc}</div><span class="f-type">${t.type}</span>`
        :`<span class="f-type">${t.type}</span>`}
      <div class="f-note">${note}</div><div class="f-zan">Remaining <b>${t.left}</b>/${t.total} Draws</div></div></div>`;}
  function cardB(t,{hi,mid}={}){
    const sold=t.left<=0;
    const isPhysical=t.art==='physical';
    return `<div class="gcard ${hi?'hi':''} ${mid?'mid':''} ${sold?'sold':''}"><div class="g-top">${badge(t,false,hi)}
      <div class="g-zan"><span class="lbl">Remaining</span><span class="num">${t.left}</span><span class="tot">/${t.total}</span></div></div>
      <div class="g-tagrow">${hi?'<span class="uptag">★ Top Tier</span>':mid?'<span class="midtag">Popular</span>':''}</div>
      <div class="g-img">${artImg(t.art)}</div><div class="g-name">${t.name}</div>${isPhysical
        ?`<div class="g-desc">${t.desc}</div><div class="g-type">${t.type}</div>`
        :`<div class="g-type">${t.type}</div>`}</div>`;
  }
  function renderPool(){
    $('.js-pool').innerHTML=`<div class="grid">${featB(last,'Final Prize','Awarded to the Player Who Draws the Last Ticket')}
      ${tiers.map(t=>cardB(t,{hi:t.hi,mid:t.mid})).join('')}</div>`;
    updateStock();
  }
  function updateSegButtons(){
    const left=normalLeft();
    const soldOut=totalLeft()<=0;
    const seg=$('.js-seg');
    seg.querySelectorAll('button').forEach(b=>{
      const n=b.dataset.n;
      const disable=soldOut||(n==='5'&&left<5)||(n==='10'&&left<10);
      b.disabled=disable;
    });
    if(soldOut)return;
    const curBtn=seg.querySelector(`button[data-n="${drawN}"]`);
    if(curBtn&&curBtn.disabled){
      drawN=1;
      seg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));
      seg.querySelector('button[data-n="1"]').classList.add('on');
    }
  }
  function showSoldOutAlert(){$('.js-soldout-overlay').classList.add('show');}
  function showStockAlert(n){$('.js-stock-overlay .js-stock-n').textContent=n;$('.js-stock-overlay').classList.add('show');}
  function refreshTearButton(){
    const b=$('.js-tear');
    if(totalLeft()<=0){
      b.disabled=true; b.querySelector('.main').innerHTML='<span class="t2 state">Sold Out</span>';
      return;
    }
    const cost=COST*curN();
    if(points<cost){
      b.disabled=true; b.querySelector('.main').innerHTML='<span class="t2 state">Insufficient Balance</span>';
    }else{
      b.disabled=false; b.querySelector('.main').innerHTML=`<span class="t2">Draw Now <small class="js-cost">${cost.toLocaleString()} Points</small></span>`;
    }
  }
  function updateStock(){
    updateSegButtons();
    // 顶部「Remaining N/100 Draws」进度条只反映一般奖级（不含 LAST，真实一番赏玩法中 LAST（ラストワン賞）
    // 是「抽中一般奖级最后一张时额外附赠」的奖励，本身不占用一般票数额度，故不计入这里的分子分母
    const left=normalLeft(),tot=normalTotal();
    $('.js-zan').textContent=left;
    $('.js-fill').style.width=(left/tot*100)+'%';
    $('.js-pts2').textContent=points.toLocaleString();
    refreshTearButton();
  }
  function showResult(results,lastTriggered,forceAgg,skipAnim){
    $('.js-rhead').textContent='Draws '+results.length+' Tickets';
    let html=lastTriggered?'<div class="last-hit serif">★ Congratulations! You Won the Last Prize! ★</div>':'';
    if(forceAgg){
      const agg={};
      results.forEach(r=>{const k=r.isLast?'L':r.tier.sho;(agg[k]=agg[k]||{tier:r.tier,isLast:r.isLast,n:0}).n++;});
      const aggList=Object.values(agg).sort((a,b)=>a.isLast?-1:b.isLast?1:0);
      aggList.forEach(g=>{html+=`<div class="sum-row">
        <div class="nm">${badge(g.tier,g.isLast)} ${g.isLast?'Last Prize · ':''}${g.tier.name}</div><div class="cnt">×${g.n}</div></div>`;});
      $('.js-rbody').innerHTML=html;
    }else{
      // LAST 固定排在「第一排左边」＝第 1 格（不是最后一格）：把它从原本的抽奖顺序末端搬到最前面，
      // 其余卡片（包含原本第 1 张）仍照实际抽奖顺序，全部各往后递补一格
      const ordered=[...results];
      const lastIdx=ordered.findIndex(r=>r.isLast);
      if(lastIdx>0){const [lastItem]=ordered.splice(lastIdx,1);ordered.unshift(lastItem);}
      html+='<div class="rk-grid">';
      ordered.forEach((r,i)=>{const t=r.tier;
        html+=`<div class="rk" data-i="${i}"><div class="reveal">${revealBadge(t,r.isLast)}
          <div class="r-txt"><div class="nm">${r.isLast?'Last Prize · ':''}${t.name}</div><div class="ty">${t.type}</div></div>
          </div>
          <div class="cover serif">OK ICHIBAN <span class="arrow">Draw ▶</span></div></div>`;});
      html+='</div>';
      $('.js-rbody').innerHTML=html;
      if(skipAnim){
        // 已确认：刷新页面时若本次抽奖结果尚未点击「收下」，直接以已揭晓状态重新打开结果弹窗，
        // 不重播撕票动画（抽奖本身在点击撕票的当下已于后端完成，动画只是纯前端效果，无需断点续播）
        ordered.forEach((r,i)=>{const el=$(`.rk[data-i="${i}"]`);if(el)el.classList.add('torn');});
      }else{
        ordered.forEach((r,i)=>setTimeout(()=>{const el=$(`.rk[data-i="${i}"]`);if(el)el.classList.add('torn');},300+i*300));
      }
    }
    $('.js-overlay').classList.add('show');
    root.scrollIntoView({behavior:'smooth',block:'start'});
  }
  function draw(){
    if(totalLeft()<=0)return;
    const want=Math.min(curN(),normalLeft()); if(want<=0)return;
    const cost=COST*want; if(points<cost){alert('Insufficient Balance');return;}
    $('.js-tear').disabled=true; // 防连点：送出后立即锁住，直到玩家点 Claim 关闭结果弹窗才解锁
    let pool=[]; tiers.forEach((t,i)=>{for(let k=0;k<t.left;k++)pool.push(i);});
    const results=[]; let lastTriggered=false;
    for(let d=0;d<want;d++){
      if(pool.length>0){
        const idx=Math.floor(Math.random()*pool.length); const ti=pool.splice(idx,1)[0];
        tiers[ti].left--; results.push({tier:tiers[ti]});
        if(pool.length===0&&last.left>0){last.left--;lastTriggered=true;results.push({tier:last,isLast:true});}
      }
    }
    points-=cost; renderPool(); showResult(results,lastTriggered,drawN==='all');
  }

  $('.js-seg').addEventListener('click',e=>{const b=e.target.closest('button');if(!b)return;
    $('.js-seg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); drawN=b.dataset.n==='all'?'all':parseInt(b.dataset.n); updateStock();});
  $('.js-tear').addEventListener('click',draw);
  $('.js-ok').addEventListener('click',()=>{$('.js-overlay').classList.remove('show');
    // 已确认：不论刚才选的是单张／五连／十连／全包，点击 Claim 关闭开奖结果弹窗后，
    // 画面固定重置回「单张 (1 Draw)」预设选中状态，玩家需重新点击才能再次选五连／十连／全包
    drawN=1;
    $('.js-seg').querySelectorAll('button').forEach(x=>x.classList.remove('on'));
    $('.js-seg').querySelector('button[data-n="1"]').classList.add('on');
    updateStock();
    if(totalLeft()<=0)showSoldOutAlert();});
  // 已确认（spec 2-9）：「已抽完提醒」弹窗是全场唯一会造成页面跳转的弹窗——
  // 不论是玩家自己这次撕券刚好抽空（见上方 .js-ok 内的判断），或是从积分商城点进时该商品已经售罄（见下方页面载入检查），
  // 点击 Got It 一律强制导回「积分商城」列表页；积分商城是独立页面、不在本文件范围内，
  // 故以 history.back() 模拟「返回上一页」，正式开发应改为导向积分商城实际路由/网址
  $('.js-soldout-ok').addEventListener('click',()=>{$('.js-soldout-overlay').classList.remove('show');
    history.back();});
  // 已确认（spec 2-3）：「库存不足提醒」弹窗关闭后停留原画面，不导回积分商城——与「已抽完提醒」是唯一的差异点
  $('.js-stock-ok').addEventListener('click',()=>{$('.js-stock-overlay').classList.remove('show');
    updateStock();});

  renderPool();

  /* ── spec-doc deep link：透过网址参数直接呈现特定画面状态，方便规格书用 iframe 嵌入示例 ──
     ?lowqty=1                  情境B：一般奖级剩余总和压到7张，示范「五连」可选／「十连」反灰
     ?lowstock=1                情境D：S Tier 售罄（半透明遮罩），其余正常
     ?soldout=1                 情境B例外／2-5：全部售罄状态（四个张数按钮与撕券按钮全部反灰），
                                 此参数刻意跳过自动弹窗，只展示背景停用状态；真实情况（无此参数、单纯页面载入时已经售罄）
                                 会自动跳出「已抽完提醒」弹窗（同 ?modal=soldout-alert 呈现的内容），见下方一般载入检查
     ?insufficient=1            情境C／2-6：积分不足状态（撕券按钮显示 Insufficient Balance，同售罄一样反灰停用）
     ?modal=rules               活动规则弹窗
     ?modal=result-single       开奖结果－逐张揭晓模式示例（2张，未含LAST）
     ?modal=result-last         开奖结果－逐张揭晓模式示例，含LAST（庆祝横幅，2张）
     ?modal=result-last-multi   开奖结果－逐张揭晓模式示例，含LAST（6张，验证LAST 固定排第1格）
     ?modal=result-agg          开奖结果－汇总列表模式示例（模拟「全包」大量张数的情况，14张）
     ?modal=result-all-small    开奖结果－「全包」张数很少（3张）时仍走汇总列表模式的示例
     ?modal=result-agg-overflow 开奖结果－汇总列表模式示例，全部9个一般奖级＋LAST 共10列，验证列表可滑动
     ?modal=result-refresh      模拟结果弹窗尚未点击「收下」前刷新页面：直接以已揭晓状态重新打开弹窗，不重播撕票动画
     ?modal=soldout-alert       已抽完提醒弹窗（单独示例，不改变背后卡片库存；点击 Got It 会 history.back()，
                                 在独立分页开启此连结时可正常测试，嵌入 spec 的 iframe 中点击不影响画面展示）
     ?modal=stock-alert&n=5     库存不足提醒弹窗（spec 2-3，并发抢购情境示例）；n 为弹窗文案代入的张数
                                （五连传 5、十连传 10，不带 n 时预设 5），点击 Got It 只关闭弹窗、停留原画面
     以上参数只影响画面初始状态，不影响一般无参数时的正常使用流程 */
  const qp = new URLSearchParams(location.search);
  if (qp.get('soldout') === '1') {
    tiers.forEach(t => t.left = 0); last.left = 0;
    renderPool();
    // 注意：此参数只呈现「售罄后的主画面持续停用状态」，故意不叫用 showSoldOutAlert()，
    // 避免提醒弹窗把这个专门展示背景页面状态的画面示例盖住／裁切不完整；
    // 提醒弹窗本身的示例由另一个独立参数 ?modal=soldout-alert 呈现（见下方 modal 分支）
  }
  if (qp.get('lowqty') === '1') {
    // 验证用：情境 B——把一般奖级剩余总和压到 7 张（<10 但 ≥5），
    // 用来示范「五连」仍可选、「十连」反灰停用
    tiers.forEach((t,i)=>{ t.left = i<7 ? 1 : 0; });
    renderPool();
  }
  if (qp.get('lowstock') === '1') {
    // 验证用：情境 D——S Tier（总量1）设为售罄示范半透明遮罩，
    // 其余奖级维持正常水位，一般奖级剩余总和仍远大于 10，撕券按钮与四个张数按钮维持正常可点击
    tiers[0].left = 0;
    renderPool();
  }
  if (qp.get('insufficient') === '1') {
    points = 0;
    updateStock();
  }
  // 已确认（spec 2-9／B-14）：真实场景下，玩家从「积分商城」点进一个当下已经全部售罄的一番赏商品，
  // 页面载入当下就该直接呈现停用状态＋自动跳出「已抽完提醒」弹窗，不需要玩家先操作撕券；
  // ?soldout=1 demo 刻意跳过此自动跳出（见上方注解，专门单独展示背景停用状态），故此处排除该 demo 参数
  if (totalLeft() <= 0 && qp.get('soldout') !== '1') {
    showSoldOutAlert();
  }
  const modal = qp.get('modal');
  if (modal === 'rules') {
    $('.rules-ov').classList.add('show');
  } else if (modal === 'soldout-alert') {
    showSoldOutAlert();
  } else if (modal === 'stock-alert') {
    showStockAlert(qp.get('n') || 5);
  } else if (modal === 'result-single') {
    showResult([{ tier: tiers[1] }, { tier: tiers[3] }], false);
  } else if (modal === 'result-last') {
    showResult([{ tier: tiers[1] }, { tier: last, isLast: true }], true);
  } else if (modal === 'result-last-multi') {
    // 验证用：模拟五连抽正好抽空一般奖级池，本次结果 5 张一般奖品＋LAST＝6 张。
    // 依规则，LAST 应该被搬到第 1 格（第一排左边），不是排在第 6 格（最后一格）
    showResult([
      { tier: tiers[2] }, { tier: tiers[4] }, { tier: tiers[6] }, { tier: tiers[7] }, { tier: tiers[8] },
      { tier: last, isLast: true }
    ], true);
  } else if (modal === 'result-agg') {
    const fake = [];
    for (let i = 0; i < 8; i++) fake.push({ tier: tiers[7] });
    for (let i = 0; i < 4; i++) fake.push({ tier: tiers[4] });
    fake.push({ tier: tiers[3] });
    fake.push({ tier: last, isLast: true });
    showResult(fake, true, true);
  } else if (modal === 'result-all-small') {
    showResult([{ tier: tiers[6] }, { tier: tiers[7] }, { tier: last, isLast: true }], true, true);
  } else if (modal === 'result-agg-overflow') {
    // 验证用：模拟全包一次中到全部 9 个一般奖级＋LAST，共 10 个不同奖级列，
    // 用来确认汇总列表超过弹窗高度（440px）时，中间列表区域会自动出现上下滑动，标题与「收下」按钮维持固定不动
    const fake = tiers.map(t => ({ tier: t }));
    fake.push({ tier: last, isLast: true });
    showResult(fake, true, true);
  } else if (modal === 'result-refresh') {
    // 验证用：模拟玩家在结果弹窗尚未点击「收下」前刷新页面——直接以已揭晓状态重新打开逐张模式弹窗，
    // 不重播撕票动画（见 showResult 的 skipAnim 参数）
    showResult([
      { tier: tiers[2] }, { tier: tiers[4] }, { tier: last, isLast: true }
    ], true, false, true);
  }
}

createApp('dev-B');
</script>
</body>
</html>
