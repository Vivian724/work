          <th style="min-width:160px;">额外奖励</th>

        </tr></thead><tbody>${rows}</tbody></table>
      </div>
    </div>`}
  </div>`;
}
function renderPlanList() {
  $('planList').innerHTML = plans.map((p,i) => renderPlanCard(p,i)).join('');
  bindPlanList();
}
function step4() {
  const total = Object.values(confSel).reduce((s,set)=>s+set.size,0);
  return `

  <div class="tip-r">⚠ <strong>注意：</strong>修改奖励配置后将<strong>立即生效</strong>，已购买但尚未领取的奖励将按最新规则执行，请谨慎操作。</div>

    <div class="fr"><div class="fl">审核方式：</div><div class="fc"><div class="rg">

    </div><div class="hint">额外奖励无论此设定，均须满足条件后手动领取</div></div></div>
    <div class="fr"><div class="fl">已验证手机号：</div><div class="fc"><div class="rg">
      <label class="ri"><input type="radio" name="phone"> 是</label>
      <label class="ri"><input type="radio" name="phone" checked> 否</label>
    </div></div></div>
    <div class="fr"><div class="fl">限制使用设备：</div><div class="fc"><div class="rg">

    </div></div></div>

    </div></div>
  </div>`;
}
function bindPlanList() {
  const pl = $('planList');
  if (!pl) return;
  // collapse
  pl.querySelectorAll('[data-toggleCol]').forEach(el => {
    el.addEventListener('click', () => {
      const pi = +el.dataset.togglecol;
      plans[pi].col = !plans[pi].col;
      renderPlanList();
    });
  });
  // delete plan
  pl.querySelectorAll('[data-delPlan]').forEach(btn => {
    btn.addEventListener('click', e => {
      e.stopPropagation();
      const pi = +btn.dataset.delplan;
      if (plans.length <= 1) { alert('至少保留一种卡型'); return; }
      plans.splice(pi,1); renderPlanList();
    });
  });

  // inputs / selects
  pl.querySelectorAll('[data-field]').forEach(inp => {
    inp.addEventListener('change', () => {
      const pi = inp.dataset.plan != null ? +inp.dataset.plan : null;
      const d  = inp.dataset.day != null ? +inp.dataset.day : null;
      const field = inp.dataset.field;
      if (pi == null) return;
      const p = plans[pi];
      if (d == null) {
        // plan-level field
        if (field==='price') p.price = Number(inp.value)||0;
        else if (field==='bt') { p.bt = inp.value; renderPlanList(); }
        else if (field==='name') p.name = inp.value;
      } else {
        // day-level field
        const parts = field.split('.');
        if (parts.length===1) p.days[d][parts[0]] = inp.value;
        else p.days[d][parts[0]][parts[1]] = inp.value;
      }
    });
  });
  // add plan button
  $('bAddPlan') && $('bAddPlan').addEventListener('click', () => {
    const days = Array.from({length:7}, () => emptyDay());
    plans.push({id:planId++, name:'新卡型', bt:'custom', price:0, col:false, days});
    renderPlanList();
    setTimeout(() => {
      const last = $(`pc${plans.length-1}`);
      if (last) last.scrollIntoView({behavior:'smooth',block:'center'});
    }, 100);
  });
  // open modal button
  $('bOpenModal') && $('bOpenModal').addEventListener('click', openModal);
  // togs
  $('sc').querySelectorAll('.tog[data-tog]').forEach(t => {
    t.addEventListener('click', () => t.classList.toggle('on'));
  });
}

  <div class="sb"><div class="sec-t">风险检测设置</div>
    <div class="fr"><div class="fl">同IP检测：</div><div class="fc"><div class="tog" data-tog id="rip"></div></div></div>

  </div>

// ── step 6 ──────────────────────────────────────────────────────
function step6() {
  const total = Object.values(confSel).reduce((s,set)=>s+set.size,0);
  const prows = plans.map(p => {
    const ex = p.days.filter(d=>d.extra.val&&d.extra.val!=='').length;
    return `<tr><td>${p.name}</td><td>${p.price.toLocaleString()} PHP</td><td>${ex>0?ex+'天有额外奖励':'仅签到奖励'}</td></tr>`;

  return `
  <div class="sdesc">请确认以下活动配置信息，确认无误后点击「确认送出」。</div>
  <div class="tip-r">● 请确认已填写所有必填项：活动名称、活动时间、各卡型周卡费用与每日奖励</div>
  <div class="pst"><div class="psn">1</div>活动模板设置</div>
  <table class="ptable">
    <tr><th style="width:160px;">字段</th><th>内容</th></tr>
    <tr><td>活动类型</td><td>周卡活动</td></tr>
    <tr><td>活动名称</td><td class="rd">未填写</td></tr>
    <tr><td>活动状态</td><td>关闭</td></tr>
    <tr><td>活动币种</td><td>PHP</td></tr>
    <tr><td>活动时间</td><td class="rd">未设置</td></tr>
    <tr><td>周期天数</td><td>7 天</td></tr>
    <tr><td>自动重置</td><td>是</td></tr>
    <tr><td>存款强制弹窗</td><td>关闭</td></tr>
  </table>
  <div class="pst"><div class="psn">2</div>活动图片</div>
  <table class="ptable">
    <tr><th>图片类型</th><th>PC 端</th><th>H5 端</th></tr>
    <tr><td>① Banner 图</td><td class="mt">未上传</td><td class="mt">未上传</td></tr>
    <tr><td>② 活动页底图</td><td class="mt">未上传</td><td class="mt">未上传</td></tr>
    <tr><td>③ 规则弹窗图</td><td class="mt">未上传</td><td class="mt">未上传</td></tr>
  </table>
  <div class="pst"><div class="psn">3</div>参与对象与名单</div>
  <table class="ptable">
    <tr><th style="width:160px;">字段</th><th>内容</th></tr>
    <tr><td>充值层级</td><td>全选（${selLevels.length} 层）</td></tr>
    <tr><td>指定代理</td><td>不指定</td></tr>
    <tr><td>会员等级</td><td>全选（VIP0–VIP10）</td></tr>
    <tr><td>黑名单</td><td class="mt">未配置</td></tr>
  </table>
  <div class="pst"><div class="psn">4</div>周卡配置（${plans.length} 种卡型）</div>
  <table class="ptable">
    <tr><th>卡型</th><th>周卡费用</th><th>额外奖励</th></tr>${prows}
  </table>
  <div style="font-size:12px;color:#999;margin-bottom:16px;">稽核游戏范围：已选 ${total} 个游戏（仅针对彩金奖励）</div>
  <div class="pst"><div class="psn">5</div>风控条件</div>
  <table class="ptable">
    <tr><th style="width:160px;">检测项目</th><th>状态</th></tr>
    <tr><td>同IP检测</td><td>关闭</td></tr>
    <tr><td>同手机号检测</td><td>关闭</td></tr>
    <tr><td>同姓名检测</td><td>关闭</td></tr>
    <tr><td>同Email检测</td><td>关闭</td></tr>
  </table>`;
}

// ── game modal ───────────────────────────────────────────────────
function openModal() {
  tmpSel = {};
  GCATS.forEach((_,i) => { tmpSel[i] = new Set(confSel[i]||[]); });
  renderModalBody();
  $('gModal').classList.remove('hidden');
}
function renderModalBody() {
  const all = GCATS.reduce((a,c)=>a.concat(c.games),[]);
  const tot = Object.values(tmpSel).reduce((s,set)=>s+set.size,0);
  let h2 = `<div style="padding:10px 14px;border-bottom:1px solid #e8e8e8;background:#f9f9f9;display:flex;align-items:center;gap:10px;">
    <input type="checkbox" class="gck" id="allGames"${tot===all.length?' checked':''}> <span style="font-size:14px;font-weight:500;">全选</span></div>`;
  GCATS.forEach((c,ci) => {
    const sel = tmpSel[ci]||new Set();
    h2 += `<div class="gcat"><div class="gcath"><input type="checkbox" class="gck" data-ci="${ci}"${sel.size===c.games.length?' checked':''}><span>${c.cat}</span></div><div class="ggames">`;
    c.games.forEach(g => {
      h2 += `<label class="gi"><input type="checkbox" data-ci="${ci}" data-g="${g}"${sel.has(g)?' checked':''}>${g}</label>`;
    });
    h2 += `</div></div>`;
  });
  $('mbody').innerHTML = h2;
  // bind modal checkboxes
  $('allGames').addEventListener('change', function() {
    GCATS.forEach((_,i) => {
      if (!tmpSel[i]) tmpSel[i]=new Set();
      if (this.checked) GCATS[i].games.forEach(g=>tmpSel[i].add(g)); else tmpSel[i].clear();
    });
    renderModalBody();
  });
  $('mbody').querySelectorAll('input[data-ci][data-g]').forEach(cb => {
    cb.addEventListener('change', function() {
      const ci=+this.dataset.ci, g=this.dataset.g;
      if (!tmpSel[ci]) tmpSel[ci]=new Set();
      if (this.checked) tmpSel[ci].add(g); else tmpSel[ci].delete(g);
    });
  });
  $('mbody').querySelectorAll('input[data-ci]:not([data-g])').forEach(cb => {
    cb.addEventListener('change', function() {
      const ci=+this.dataset.ci;
      if (!tmpSel[ci]) tmpSel[ci]=new Set();
      if (this.checked) GCATS[ci].games.forEach(g=>tmpSel[ci].add(g)); else tmpSel[ci].clear();
      renderModalBody();
    });
  });
}
function closeModal() { $('gModal').classList.add('hidden'); }
function confirmModal() {
  GCATS.forEach((_,i) => { confSel[i]=new Set(tmpSel[i]||[]); });
  closeModal(); renderStep();
}
$('mclBtn').addEventListener('click', closeModal);
$('mCancel').addEventListener('click', closeModal);
$('mOk').addEventListener('click', confirmModal);

// ── bind step 5 risk toggles ─────────────────────────────────────
function bindStep5Risk() {
  ['rip','rph','rnm','rem'].forEach(id => {
    const t = $(id);
    if (!t) return;
    t.addEventListener('click', () => {
      t.classList.toggle('on');
      const anyOn = ['rip','rph','rnm','rem'].some(x => $(x)&&$(x).classList.contains('on'));
      const block = $('rejectBlock');
      if (!block) return;
      block.style.opacity = anyOn ? '1' : '0.4';
      block.style.pointerEvents = anyOn ? 'auto' : 'none';
      const rauto = $('rauto'), rejN = $('rejN');
      if (anyOn) { rauto&&rauto.classList.add('on'); rejN&&(rejN.disabled=false); }
      else { rauto&&rauto.classList.remove('on'); rejN&&(rejN.disabled=true,rejN.value=''); }
    });
  });
}

// ── override renderStep to also bind step-specific events ────────
const _renderStep = renderStep;
function renderStep() {
  const el2 = $('sc');
  const fns = [null, step1, step2, step3, step4, step5, step6];
  el2.innerHTML = fns[cur]();
  // bind togs in all steps
  el2.querySelectorAll('.tog[data-tog]').forEach(t => {
    t.addEventListener('click', () => t.classList.toggle('on'));
  });
  if (cur===2) bindLang();
  if (cur===3) bindDrops();
  if (cur===4) bindPlanList();
  if (cur===5) bindStep5Risk();
}

// ── init ─────────────────────────────────────────────────────────
goStep(1);
</script>
