/* preview */
.preview-warn{background:#fff2f0;border:1px solid #ffccc7;border-radius:4px;padding:10px 14px;margin-bottom:16px;font-size:13px;color:#ff4d4f;}

.preview-snum{width:22px;height:22px;border-radius:50%;background:#1677ff;color:#fff;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.preview-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 20px;}

.pk{color:#999;min-width:90px;flex-shrink:0;}
.pk.req::before{content:'*';color:#ff4d4f;margin-right:2px;}
.pv{color:#333;}.pv.empty{color:#bbb;}.pv.red{color:#ff4d4f;}
.prev-img-table{width:100%;border-collapse:collapse;font-size:13px;margin-top:8px;}

/* 领取条件区块 */

.claim-inline-input::-webkit-outer-spin-button,.claim-inline-input::-webkit-inner-spin-button{-webkit-appearance:none;}
.hidden{display:none!important;}
</style>

<script>
// ── 步骤名称（6步）──────────────────────────────────────────────
const stepNames=['活动模板设置','活动图片','参与对象与名单','活动条件','风控条件','提交预览'];
let cur=1, claimAuto=true, awardRows=[{}];

// ── 语系 ────────────────────────────────────────────────────────
const langOptions=[
  {val:'default',label:'预设'},
  {val:'en',label:'英文'},
  {val:'ph',label:'菲律宾语'},
  {val:'vn',label:'越南语'},
  {val:'ceb',label:'宿雾语'}
];
let selectedLangs=['default'], activeLangTab='default', langOpen=false;

// ── 其他多选 ────────────────────────────────────────────────────
const levelOptions=[{val:'default',label:'默认层'},{val:'1',label:'第一层'},{val:'2',label:'第二层'},{val:'3',label:'第三层'},{val:'4',label:'第四层'},{val:'5',label:'第五层'},{val:'internal',label:'内部充值'}];
let selectedLevels=levelOptions.map(function(o){return o.val;}),levelOpen=false;
const vipOptions=Array.from({length:11},(_,i)=>({val:'vip'+i,label:'VIP'+i}));
let selectedVips=vipOptions.map(function(o){return o.val;}),vipOpen=false;

// ── 游戏 ────────────────────────────────────────────────────────
const gameCategories=[
  {cat:'EVO:EvoLive',games:['Football Studio','Crazy Coin Flip','Dead or Alive: Saloon','EvoLive Baccarat A','Football Studio Dice','Mega Ball','French Roulette Gold','Auto Lightning Roulette','Crazy Time A DNT','Speed Baccarat A']},
  {cat:'TPG:TPG',games:['Space Galaxy','Lucky Leprechaun','8 Dragons','Mahjong House','Sic-Bo']},
  {cat:'CQ9 Gaming:SLOT',games:['Money Tree','Hot Spin','Sky Lanterns','Lucky Bats','Meow','Fortune Dragon']},
  {cat:'PG:PG',games:['Pinata Wins','Dead Man\'s Riches','Jack the Giant Hunter','Diner Frenzy Spins']},
  {cat:'电子游戏',games:['老虎机A','老虎机B','老虎机C','经典水果机','幸运转盘']},
  {cat:'电子宾果游戏',games:['宾果A','宾果B','宾果C','超级宾果','快速宾果']},
];
let tempSelected={},confirmedSelected={},confirmedCount=0;

// 初始化全选
gameCategories.forEach(function(c,i){
  confirmedSelected[i]=new Set(c.games);
  confirmedCount+=c.games.length;
});

// ── 导航 ────────────────────────────────────────────────────────
function renderNav(){
  document.getElementById('stepNav').innerHTML=stepNames.map(function(n,i){
    var num=i+1,isA=num===cur,isD=num<cur;
    // 所有步骤都可以直接点击跳转
    return '<div class="step-nav-item '+(isA?'active':isD?'done':'')+'" onclick="goStep('+num+')" style="cursor:pointer;">'+
      '<div class="snum">'+(isD?'✓':num)+'</div><span>'+n+'</span>'+
    '</div>';
  }).join('');
}
function renderTopBtns(){
  var isFirst=cur===1,isLast=cur===6;
  var h='';
  if(!isFirst)h+='<button class="btn-prev" onclick="goStep('+(cur-1)+')">‹ 上一步</button>';
  if(isLast){
    h+='<a href="activity_list.html" class="btn-exit">退出编辑 ↩</a>';
    h+='<button class="btn-submit">确认送出</button>';
  }else{
    h+='<button class="btn-next" onclick="goStep('+(cur+1)+')">下一步 ›</button>';
    h+='<a href="activity_list.html" class="btn-exit">退出编辑 ↩</a>';
  }
  document.getElementById('topBtns').innerHTML=h;
}
function goStep(n){cur=n;renderNav();renderTopBtns();renderStep();}
function toggle(el){el.classList.toggle('on');}

function renderStep(){
  var el=document.getElementById('stepContent');
  if(cur===1)el.innerHTML=step1();
  else if(cur===2){el.innerHTML=step2();setupLangDrop();}
  else if(cur===3){el.innerHTML=step3();setupDrops();}
  else if(cur===4){el.innerHTML=step4();renderAward();setupRiskToggle();}
  else if(cur===5)el.innerHTML=step5();
  else el.innerHTML=step6();
}

// ════════════════════════════════════════════════════════════════
// 步骤一：活动模板设置

function step2(){

    ?'<span class="ms-placeholder">请选择语系</span>'
    :selectedLangs.map(function(v){
        var lb=langOptions.find(function(o){return o.val===v;});
        lb=lb?lb.label:v;
        return '<span class="ms-tag">'+lb+(v==='default'?'':' <span class="ms-rm" onclick="removeLang(event,\''+v+'\')">×</span>')+'</span>';
      }).join('');

  var titleHtml= selectedLangs.length===1 && selectedLangs[0]==='default'
    ? '<div class="field-row"><div class="field-label" style="min-width:140px;">活动标题：</div><div class="field-ctrl"><input type="text" class="f-input" placeholder="请输入活动标题"></div></div>'
    : selectedLangs.map(function(v){
        var lb=langOptions.find(function(o){return o.val===v;});
        lb=lb?lb.label:v;
        var label=v==='default'?'活动标题':'活动标题('+lb+')';
        return '<div class="field-row"><div class="field-label" style="min-width:140px;">'+label+'：</div><div class="field-ctrl"><input type="text" class="f-input" placeholder="请输入活动标题"></div></div>';
      }).join('');

  var tabHtml=selectedLangs.map(function(v){
    var lb=langOptions.find(function(o){return o.val===v;});

    return '<div class="lang-tab '+(v===activeLangTab?'active':'')+'" onclick="switchLangTab(\''+v+'\')">'+lb+'</div>';
  }).join('');

  var ddHtml=langOptions.map(function(o){
    var isSel=selectedLangs.includes(o.val);
    var disableDefault=o.val==='default';
    return '<div class="ms-option '+(isSel?'selected':'')+'" onclick="'+(disableDefault?'':'toggleLang(\''+o.val+'\')')+'">'+
      '<span>'+o.label+(disableDefault?' <span style="font-size:11px;color:#bbb;">（固定）</span>':'')+'</span>'+

        '<div class="field-label">链接：</div>'+

      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">'+

function addAddon(){
  if(addonBlocks.length>=3)return;
  addonBlocks.push({name:'',link:''});
  refreshAddonList();
}

function delAddon(i){
  addonBlocks.splice(i,1);
  refreshAddonList();
}

function refreshAddonList(){
  var el=document.getElementById('addonList');
  if(el)el.innerHTML=renderAddonList();
  // 更新新增按钮状态
  var addBtn=document.getElementById('addonAddBtn');
  if(addBtn){
    if(addonBlocks.length>=3){
      addBtn.textContent='最多新增 3 个配置';
      addBtn.disabled=true;
      addBtn.style.background='#f5f5f5';
      addBtn.style.color='#bbb';
      addBtn.style.cursor='not-allowed';
      addBtn.style.border='1px solid #e8e8e8';
    } else {
      addBtn.textContent='+ 新增配置';
      addBtn.disabled=false;
      addBtn.style.background='#1677ff';
      addBtn.style.color='#fff';
      addBtn.style.cursor='pointer';
      addBtn.style.border='none';
    }
  }
}

// 语系下拉逻辑
function setupLangDrop(){
  setTimeout(function(){
    document.addEventListener('click',function h(e){
      if(!e.target.closest('#langWrap')&&!e.target.closest('#langDropdown')&&langOpen){
        langOpen=false;document.removeEventListener('click',h);renderStep();
      }
    });
  },0);
}
function toggleLangDrop(e){e.stopPropagation();langOpen=!langOpen;renderStep();if(langOpen)setupLangDrop();}
function toggleLang(v){
  if(v==='default')return;
  if(selectedLangs.includes(v))selectedLangs=selectedLangs.filter(function(x){return x!==v;});
  else selectedLangs.push(v);
  if(!selectedLangs.includes(activeLangTab))activeLangTab=selectedLangs[0]||'default';
  langOpen=true;renderStep();setupLangDrop();
}
function removeLang(e,v){
  e.stopPropagation();
  if(v==='default')return;
  selectedLangs=selectedLangs.filter(function(x){return x!==v;});
  if(activeLangTab===v)activeLangTab=selectedLangs[0]||'default';
  langOpen=false;renderStep();
}
function switchLangTab(v){activeLangTab=v;var el=document.getElementById('langTabContent');if(el)el.innerHTML=renderLangTabContent();}

function toggleRisk(el, key){
  el.classList.toggle('on');
  updateAutoRejectState();
}

function updateAutoRejectState(){
  var anyOn=['tog-ip','tog-phone','tog-name','tog-email'].some(function(id){
    var t=document.getElementById(id);return t&&t.classList.contains('on');
  });
  var block=document.getElementById('autoRejectBlock');
  if(!block)return;
  if(anyOn){
    block.style.opacity='1';
    block.style.pointerEvents='auto';
    // 自动打开自动拒绝开关
    var tog=document.getElementById('tog-autorej');
    if(tog&&!tog.classList.contains('on'))tog.classList.add('on');
    var inp=document.getElementById('rejectInput');
    if(inp){inp.disabled=false;inp.classList.remove('f-input-disabled');}
  } else {
    block.style.opacity='0.4';
    block.style.pointerEvents='none';
    var tog=document.getElementById('tog-autorej');
    if(tog)tog.classList.remove('on');
    var inp=document.getElementById('rejectInput');
    if(inp){inp.disabled=true;inp.classList.add('f-input-disabled');}
  }
}

function openModal(){
  tempSelected={};
  gameCategories.forEach(function(c,i){tempSelected[i]=new Set(confirmedSelected[i]||[]);});
  renderModalBody();
  document.getElementById('gameModal').classList.remove('hidden');
}

function renderModalBody(){
  var allGames=gameCategories.reduce(function(a,c){return a.concat(c.games);},[]);
  var totalSel=Object.values(tempSelected).reduce(function(s,set){return s+set.size;},0);
  var allSelected=totalSel===allGames.length;

  document.getElementById('modalBody').innerHTML=
    // 全选行
    '<div style="padding:10px 14px;border-bottom:1px solid #e8e8e8;background:#f9f9f9;display:flex;align-items:center;gap:10px;">'+
      '<input type="checkbox" class="cat-check" '+(allSelected?'checked':'')+' onclick="toggleAllGames(this.checked)">'+
      '<span style="font-size:14px;font-weight:500;color:#333;">全选</span>'+
    '</div>'+
    gameCategories.map(function(c,ci){
      var sel=tempSelected[ci]||new Set();
      var allChk=sel.size===c.games.length;
      return '<div class="game-category">'+
        '<div class="cat-header">'+
          '<input type="checkbox" class="cat-check" '+(allChk?'checked':'')+' onclick="toggleCat('+ci+',this.checked)">'+
          '<span class="cat-name">'+c.cat+'</span>'+
        '</div>'+
        '<div class="cat-games">'+
          c.games.map(function(g){
            return '<label class="game-row-item"><input type="checkbox" '+(sel.has(g)?'checked':'')+' onchange="toggleGame('+ci+',\''+g+'\',this.checked)">'+g+'</label>';
          }).join('')+
        '</div>'+
      '</div>';
    }).join('');
}

function toggleAllGames(checked){
  gameCategories.forEach(function(c,i){
    if(!tempSelected[i])tempSelected[i]=new Set();
    if(checked)c.games.forEach(function(g){tempSelected[i].add(g);});
    else tempSelected[i].clear();
  });
  renderModalBody();
}
function toggleCat(ci,checked){if(!tempSelected[ci])tempSelected[ci]=new Set();if(checked)gameCategories[ci].games.forEach(function(g){tempSelected[ci].add(g);});else tempSelected[ci].clear();renderModalBody();}
function toggleGame(ci,g,checked){if(!tempSelected[ci])tempSelected[ci]=new Set();if(checked)tempSelected[ci].add(g);else tempSelected[ci].delete(g);renderModalBody();}
function confirmGames(){
  confirmedSelected={};
  gameCategories.forEach(function(_,i){confirmedSelected[i]=new Set(tempSelected[i]||[]);});
  confirmedCount=Object.values(confirmedSelected).reduce(function(s,set){return s+set.size;},0);
  closeModal();renderStep();
}
function closeModal(){document.getElementById('gameModal').classList.add('hidden');}
