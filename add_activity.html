<script>
const stepNames=['活动模板设置','活动图片','参与对象与名单','活动条件','风控设定','领取条件','提款条件','提交预览'];
let cur=1,claimAuto=true,awardRows=[{}];
const langOptions=[{val:'zh',label:'简体中文'},{val:'en',label:'英文'},{val:'ph',label:'菲律宾语'},{val:'vn',label:'越南语'},{val:'ceb',label:'宿雾语'}];
let selectedLangs=['zh'],activeLangTab='zh',langOpen=false;
const levelOptions=[{val:'default',label:'默认层'},{val:'1',label:'第一层'},{val:'2',label:'第二层'},{val:'3',label:'第三层'},{val:'4',label:'第四层'},{val:'5',label:'第五层'},{val:'internal',label:'内部充值'}];
let selectedLevels=[],levelOpen=false;
const vipOptions=Array.from({length:11},(_,i)=>({val:'vip'+i,label:'VIP'+i}));
let selectedVips=[],vipOpen=false;
const gameCategories=[
  {cat:'EVO:EvoLive',games:['Football Studio','Crazy Coin Flip','Dead or Alive: Saloon','EvoLive Baccarat A','Football Studio Dice','Mega Ball','French Roulette Gold','Auto Lightning Roulette','Crazy Time A DNT','Speed Baccarat A']},
  {cat:'TPG:TPG',games:['Space Galaxy','Lucky Leprechaun','8 Dragons','Mahjong House','Sic-Bo']},
  {cat:'CQ9 Gaming:SLOT',games:['Money Tree','Hot Spin','Sky Lanterns','Lucky Bats','Meow','Fortune Dragon']},
  {cat:'PG:PG',games:['Pinata Wins','Dead Man\'s Riches','Jack the Giant Hunter','Diner Frenzy Spins']},
  {cat:'电子游戏',games:['老虎机A','老虎机B','老虎机C','经典水果机','幸运转盘']},
  {cat:'电子宾果游戏',games:['宾果A','宾果B','宾果C','超级宾果','快速宾果']},
];
let tempSelected={},confirmedSelected={},confirmedCount=0;

function renderNav(){
  document.getElementById('stepNav').innerHTML=stepNames.map((n,i)=>{
    const num=i+1,isA=num===cur,isD=num<cur;
    return '<div class="step-nav-item '+(isA?'active':isD?'done':'')+'" onclick="goStep('+num+'"><div class="snum">'+(isD?'✓':num)+'</div><span>'+n+'</span></div>';
  }).join('');
}
function renderTopBtns(){
  const isFirst=cur===1,isLast=cur===8;
  let h='';
  if(!isFirst)h+='<button class="btn-prev" onclick="goStep('+(cur-1)+')">‹ 上一步</button>';
  if(isLast){
    h+='<a href="activity_list.html" class="btn-exit">退出编辑 ↩</a>';
    h+='<button class="btn-submit">确认送出</button>';
  }else{
    h+='<button class="btn-next" onclick="goStep('+(cur+1)+')">下一步 ›</button>';
    h+='<a href="activity_list.html" class="btn-exit">退出编辑 ↩</a>';
  }
  document.getElementById('topBtns').innerHTML=h;
}
function goStep(n){cur=n;renderNav();renderTopBtns();renderStep();}
function toggle(el){el.classList.toggle('on');}

function renderStep(){
  const el=document.getElementById('stepContent');
  if(cur===1)el.innerHTML=step1();
  else if(cur===2){el.innerHTML=step2();setupLangDrop();}
  else if(cur===3){el.innerHTML=step3();setupDrops();}
  else if(cur===4){el.innerHTML=step4();renderAward();}
  else if(cur===5)el.innerHTML=step5();
  else if(cur===6)el.innerHTML=step6();
  else if(cur===7)el.innerHTML=step7();
