<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>Gcash配置 - 提款</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;font-size:14px;color:#333;background:#f0f2f5;min-width:1280px;}
.layout{display:flex;min-height:100vh;}

/* 侧边栏 */
.sidebar{width:160px;flex-shrink:0;background:#fff;border-right:0.5px solid #e8e8e8;padding-top:8px;}
.menu-group-title{padding:10px 14px 6px;font-size:12px;color:#aaa;font-weight:500;}
.menu-item{display:flex;align-items:center;height:38px;padding:0 14px 0 20px;font-size:13px;color:#555;cursor:pointer;border-left:3px solid transparent;text-decoration:none;}
.menu-item:hover{background:#f5f5f5;color:#1677ff;}
.menu-item.active{color:#1677ff;background:#e6f4ff;border-left-color:#1677ff;}

/* 右侧 */
.right{flex:1;display:flex;flex-direction:column;min-width:0;}
.topbar{background:#fff;border-bottom:0.5px solid #e8e8e8;height:50px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0;}
.top-left{font-size:12px;color:#666;white-space:nowrap;}
.top-center{display:flex;align-items:center;flex:1;justify-content:center;overflow:hidden;}
.top-stat{font-size:11px;color:#666;white-space:nowrap;padding:0 6px;}
.top-stat .num{color:#1677ff;font-weight:500;}
.top-stat .warn{color:#ff4d4f;font-weight:500;}
.top-div{width:0.5px;height:12px;background:#e0e0e0;flex-shrink:0;}
.top-right{display:flex;align-items:center;gap:8px;font-size:13px;color:#555;}
.bell{width:26px;height:26px;border-radius:50%;border:0.5px solid #e8e8e8;display:flex;align-items:center;justify-content:center;}
.avatar{width:26px;height:26px;border-radius:50%;background:#ff4d4f;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:500;}

/* 内容区 */
.content-area{flex:1;padding:12px 16px;}
.bc-bar{font-size:13px;color:#999;display:flex;align-items:center;gap:6px;margin-bottom:12px;}
.bc-bar .cur{color:#333;}

/* 页面卡片 */
.page-card{background:#fff;border-radius:4px;border:0.5px solid #e8e8e8;}

/* Tab 样式 */
.tab-bar{display:flex;align-items:center;padding:0 16px;border-bottom:0.5px solid #e8e8e8;gap:4px;}
.tab-item{padding:10px 16px;font-size:13px;color:#555;cursor:pointer;user-select:none;border-radius:4px 4px 0 0;position:relative;top:1px;}
.tab-item:hover{color:#1677ff;}
.tab-item.active{color:#1677ff;background:#fff;border:1px solid #e8e8e8;border-bottom:1px solid #fff;font-weight:500;}

/* 表格 */
.list-area{padding:12px 16px 16px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#fafafa;padding:9px 8px;text-align:left;font-weight:500;color:#888;border-bottom:1px solid #f0f0f0;white-space:nowrap;}
td{padding:11px 8px;border-bottom:0.5px solid #f0f0f0;color:#333;vertical-align:middle;}
tr:last-child td{border-bottom:none;}
tr:hover td{background:#fafafa;}
.btn-edit{font-size:12px;color:#1677ff;background:#e6f4ff;border:1px solid #91caff;border-radius:12px;padding:3px 14px;cursor:pointer;}
.btn-edit:hover{background:#bae0ff;}

/* 弹窗 */
.overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.45);display:flex;align-items:center;justify-content:center;z-index:500;}
.modal{background:#fff;border-radius:8px;width:520px;box-shadow:0 8px 32px rgba(0,0,0,0.15);overflow:hidden;}
.modal-header{padding:16px 24px 12px;position:relative;border-bottom:0.5px solid #f0f0f0;}
.modal-title{font-size:15px;font-weight:500;color:#333;}
.modal-close{position:absolute;top:14px;right:20px;background:none;border:none;font-size:20px;color:#999;cursor:pointer;line-height:1;}
.modal-close:hover{color:#333;}
.modal-body{padding:24px 24px 8px;}
.form-row{display:flex;align-items:flex-start;margin-bottom:20px;}
.form-label{width:90px;text-align:right;padding-right:12px;font-size:13px;color:#333;padding-top:6px;flex-shrink:0;}
.required{color:#ff4d4f;margin-right:2px;}
.form-ctrl{flex:1;}
.fi-select{width:100%;height:36px;border:1px solid #d9d9d9;border-radius:4px;padding:0 10px;font-size:13px;color:#333;background:#fff;outline:none;cursor:pointer;appearance:auto;}
.fi-select:focus{border-color:#1677ff;}
.fi-select.err{border-color:#ff4d4f;}
.fi-input{width:100%;height:36px;border:1px solid #d9d9d9;border-radius:4px;padding:0 10px;font-size:13px;color:#333;outline:none;}
.fi-input:focus{border-color:#1677ff;}
.err-msg{color:#ff4d4f;font-size:12px;margin-top:4px;}
.modal-footer{padding:14px 24px 20px;display:flex;justify-content:flex-end;gap:10px;border-top:0.5px solid #f0f0f0;}
.btn-cancel{height:32px;padding:0 22px;border:1px solid #d9d9d9;border-radius:16px;background:#fff;font-size:13px;cursor:pointer;color:#333;}
.btn-cancel:hover{border-color:#1677ff;color:#1677ff;}
.btn-confirm{height:32px;padding:0 22px;border:none;border-radius:16px;background:#1677ff;color:#fff;font-size:13px;cursor:pointer;}
.btn-confirm:hover{background:#4096ff;}
</style>
</head>
<body>
<div class="layout">

  <!-- 侧边栏 -->
  <div class="sidebar">
    <div class="menu-group-title">充值配置</div>
    <a class="menu-item active">Gcash配置</a>
  </div>

  <!-- 右侧 -->
  <div class="right">

    <!-- 顶栏 -->
    <div class="topbar">
      <div class="top-left">当前时间：2026/05/14 12:00:00 +08:00</div>
      <div class="top-center">
        <span class="top-stat">在线人数：<span class="num">39</span></span>
        <div class="top-div"></div>
        <span class="top-stat">当日注册：<span class="num">0</span></span>
        <div class="top-div"></div>
        <span class="top-stat">实名认证待处理：<span class="warn">0</span></span>
        <div class="top-div"></div>
        <span class="top-stat">当日充值成功：<span class="num">15</span></span>
        <div class="top-div"></div>
        <span class="top-stat">充值：<span class="num">0</span></span>
        <div class="top-div"></div>
        <span class="top-stat">提款：<span class="warn">1</span></span>
        <div class="top-div"></div>
        <span class="top-stat">风控审核：<span class="num">0</span></span>
        <div class="top-div"></div>
        <span class="top-stat">待处理修改余额审批：<span class="num">0</span></span>
        <div class="top-div"></div>
        <span class="top-stat">VIP派奖审核：<span class="num">0</span></span>
      </div>
      <div class="top-right">
        <div class="bell">🔔</div>
        <div class="avatar">VP</div>
        <span>vivian_pm ▾</span>
      </div>
    </div>

    <!-- 内容 -->
    <div class="content-area">
      <div class="bc-bar">
        <span>位置</span><span>›</span><span class="cur">Gcash配置</span>
      </div>

      <div class="page-card">
        <div class="tab-bar">
          <div class="tab-item" onclick="switchTab('recharge')">充值</div>
          <div class="tab-item active">提款</div>
        </div>
        <div class="list-area">
          <table>
            <thead>
              <tr>
                <th>支付名称</th>
                <th>支付渠道</th>
                <th style="text-align:right">操作</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>Gcash提款</td>
                <td>Gcash</td>
                <td style="text-align:right"><button class="btn-edit" onclick="openModal(0)">编辑</button></td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- 弹窗 -->
<div class="overlay" id="modal-overlay" style="display:none" onclick="handleOverlayClick(event)">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title">在线支付配置</div>
      <button class="modal-close" onclick="closeModal()">×</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-label"><span class="required">*</span>支付渠道：</div>
        <div class="form-ctrl">
          <select class="fi-select" id="pay-type" onchange="clearErr()">
            <option value="">Select</option>
            <option value="gcash">Gcash</option>
            <option value="bank">Bank Transfer</option>
            <option value="paymaya">PayMaya</option>
            <option value="grabpay">GrabPay</option>
          </select>
          <div class="err-msg" id="type-err" style="display:none">请选择支付类型</div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-confirm" onclick="submitForm()">确定</button>
    </div>
  </div>
</div>

<script>
const rows = [
  {name:'Gcash提款', type:'gcash'}
];

function switchTab(t) {
  if (t === 'recharge') alert('切换到充值页');
}

function openModal(i) {
  document.getElementById('pay-type').value = rows[i].type;
  document.getElementById('type-err').style.display = 'none';
  document.getElementById('pay-type').classList.remove('err');
  document.getElementById('modal-overlay').style.display = 'flex';
}

function closeModal() {
  document.getElementById('modal-overlay').style.display = 'none';
}

function handleOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

function clearErr() {
  document.getElementById('type-err').style.display = 'none';
  document.getElementById('pay-type').classList.remove('err');
}

function submitForm() {
  if (!document.getElementById('pay-type').value) {
    document.getElementById('type-err').style.display = 'block';
    document.getElementById('pay-type').classList.add('err');
    return;
  }
  closeModal();
}
</script>
</body>
</html>
