function renderNav() {
  $('snav').innerHTML = STEPS.map((n,i) => {
    const num = i+1;
    const cls = num===cur ? 'act' : num<cur ? 'dn' : '';
    return `<div class="si ${cls}" data-step="${num}">
      <div class="sn">${num<cur ? '✓' : num}</div><span>${n}</span></div>`;
  }).join('');
  $('snav').querySelectorAll('.si').forEach(el => {
    el.addEventListener('click', () => goStep(+el.dataset.step));
  });
}
function renderBtns() {
  const isLast = cur === STEPS.length;
  let h2 = cur > 1 ? `<button class="b-prev" id="bPrev">‹ 上一步</button>` : '';
  if (isLast) {
    h2 += `<a href="#" class="b-exit">退出编辑 ↩</a><button class="b-sub">✓ 确认送出</button>`;
  } else {
    h2 += `<button class="b-next" id="bNext">下一步 ›</button><a href="#" class="b-exit">退出编辑 ↩</a>`;
  }
  $('stbtns').innerHTML = h2;
  $('bPrev') && $('bPrev').addEventListener('click', () => goStep(cur-1));
  $('bNext') && $('bNext').addEventListener('click', () => goStep(cur+1));
}
function goStep(n) { cur=n; renderNav(); renderBtns(); renderStep(); }
function renderStep() {
  const el2 = $('sc');
  const fns = [null, step1, step2, step3, step4, step5, step6];
  el2.innerHTML = fns[cur]();
  el2.querySelectorAll('.tog[data-tog]').forEach(t => {
    t.addEventListener('click', () => t.classList.toggle('on'));
  });
  if (cur===3) bindDrops();
  if (cur===4) bindPlanList();
}

function bindDrops() {
  function bindMs(wrapId, ddId, selArr, items) {
    const wrap = $(wrapId), dd = $(ddId);
    if (!wrap || !dd) return;
    let open = false;
    wrap.addEventListener('click', e => {
      e.stopPropagation();
      open = !open;
      dd.classList.toggle('hidden', !open);
    });
    document.addEventListener('click', function h2(e) {
      if (!e.target.closest('#'+wrapId) && !e.target.closest('#'+ddId) && open) {
        open = false; dd.classList.add('hidden');
        document.removeEventListener('click', h2);
      }
    });
    dd.querySelector('[data-msAll]') && dd.querySelector('[data-msAll]').addEventListener('click', () => {
      if (selArr.length === items.length) selArr.splice(0); else { selArr.splice(0); items.forEach(o=>selArr.push(o.v)); }
      renderStep(); bindDrops();
    });
    dd.querySelectorAll('[data-msV]').forEach(opt => {
      opt.addEventListener('click', () => {
        const v = opt.dataset.msv;
        const idx = selArr.indexOf(v);
        if (idx>=0) selArr.splice(idx,1); else selArr.push(v);
        renderStep(); bindDrops();
      });
    });
    wrap.querySelectorAll('[data-rmV]').forEach(btn => {
      btn.addEventListener('click', e => {
        e.stopPropagation();
        const v = btn.dataset.rmv;
        const idx = selArr.indexOf(v);
        if (idx>=0) selArr.splice(idx,1);
        renderStep(); bindDrops();
      });
    });
  }
  bindMs('lvlWrap','lvlDd', selLevels, LEVELS);
  bindMs('vipWrap','vipDd', selVips, VIPS);
  // agent radio
  $('sc').querySelectorAll('input[name=agent]').forEach(r => {
    r.addEventListener('change', () => {
      $('aLine') && $('aLine').classList.toggle('hidden', r.value !== 'line');
    });
  });
  // agent modal button
  $('bOpenAgentModal') && $('bOpenAgentModal').addEventListener('click', openAgentModal);
  // togs
  $('sc').querySelectorAll('.tog[data-tog]').forEach(t => {
    t.addEventListener('click', () => t.classList.toggle('on'));
  });
}

function bindPlanList() {
  const pl = $('planList');

    el.addEventListener('click', () => {
      const pi = +el.dataset.togglecol;
      plans[pi].col = !plans[pi].col;
      renderPlanList();
    });
  });
  pl.querySelectorAll('[data-field]').forEach(inp => {
    inp.addEventListener('change', () => {
      const pi = inp.dataset.plan != null ? +inp.dataset.plan : null;
      const d  = inp.dataset.day != null ? +inp.dataset.day : null;
      const field = inp.dataset.field;
      if (pi == null) return;
      const p = plans[pi];
      if (d == null) {
        if (field==='price') p.price = Number(inp.value)||0;
        else if (field==='bt') { p.bt = inp.value; renderPlanList(); }
      } else {
        const parts = field.split('.');
        if (parts.length===1) p.days[d][parts[0]] = inp.value;
        else p.days[d][parts[0]][parts[1]] = inp.value;
      }
    });
  });
  $('bOpenModal') && $('bOpenModal').addEventListener('click', openModal);
  $('sc').querySelectorAll('.tog[data-tog]').forEach(t => {
    t.addEventListener('click', () => t.classList.toggle('on'));

function toggleRisk5(el) {
  el.classList.toggle('on');
  const anyOn = ['rip','rph','rnm','rem'].some(id => { const t=$(id); return t&&t.classList.contains('on'); });
  const block=$('rejectBlock');
  if (!block) return;
  block.style.opacity = anyOn ? '1' : '0.4';
  block.style.pointerEvents = anyOn ? 'auto' : 'none';
  const rauto=$('rauto'), rejN=$('rejN');
  if (anyOn) {
    rauto && rauto.classList.add('on');
    rejN && (rejN.disabled=false);
  } else {
    rauto && rauto.classList.remove('on');
    rejN && (rejN.disabled=true, rejN.value='');
  }
}

// ── step 6 ──────────────────────────────────────────────────────
function step6() {
  const total = Object.values(confSel).reduce((s,set)=>s+set.size,0);
  function row(req,k,v,red) {
    return `<div class="preview-row"><span class="pk${req?' req':''}">${k}：</span><span class="pv${red?' red':v==='–'?' empty':''}">${v}</span></div>`;
  }
  function pRow(num,title,body,last) {
    return `<div style="display:grid;grid-template-columns:130px 1fr;border-bottom:${last?'none':'1px solid #e8e8e8'}">
      <div style="padding:14px 16px;border-right:1px solid #e8e8e8;">
        <div class="preview-step-title"><div class="preview-snum">${num}</div>${title}</div>
      </div>
      <div style="padding:14px 16px;">${body}</div>
    </div>`;
  }
  const agentStr = selAgentLine ? (AGENTS.find(a=>a.v===selAgentLine)||{l:selAgentLine}).l : '不指定';
  const planRows = plans.map(p => {
    const ex = p.days.filter(d=>d.extra.val&&d.extra.val!=='').length;
    return row(false, p.name, `${p.price.toLocaleString()} PHP · ${ex>0?ex+'天有额外奖励':'仅签到奖励'}`);
  }).join('');
  return `
  <div class="sdesc">请确认以下活动配置信息，确认无误后点击「确认送出」。</div>
  <div class="preview-warn">● 请填写以下必填字段：活动名称、进行时间、活动使用时间</div>
  <div style="border:1px solid #e8e8e8;border-radius:4px;overflow:hidden;">
    <div style="display:grid;grid-template-columns:130px 1fr;background:#f5f7fa;border-bottom:1px solid #e8e8e8;">
      <div style="padding:10px 16px;font-size:13px;font-weight:500;color:#666;border-right:1px solid #e8e8e8;">步骤</div>
      <div style="padding:10px 16px;font-size:13px;font-weight:500;color:#666;">相关字段</div>
    </div>
    ${pRow('1','活动模板设置',
      `<div class="preview-grid">
        ${row(false,'活动类型','周卡活动')}${row(true,'活动状态','关闭')}
        ${row(true,'活动币种','PHP')}${row(true,'活动名称','–',true)}
        ${row(true,'进行时间','–',true)}${row(true,'活动使用时间','–',true)}
      </div>`
    )}
    ${pRow('2','活动图片',
      `<div class="preview-grid">
        ${row(false,'首页浮窗','关闭')}${row(false,'排序','0')}
        ${row(false,'备注','–')}
      </div>`
    )}
    ${pRow('3','参与对象与名单',
      `<div class="preview-grid">
        ${row(false,'充值层级',`全选（${selLevels.length} 层）`)}${row(false,'指定代理线',agentStr)}
        ${row(false,'新会员限制','否')}${row(false,'会员等级','全选（VIP0–VIP10）')}
        ${row(false,'黑名单','–')}
      </div>`
    )}
    ${pRow('4','活动条件',
      `<div class="preview-grid">
        ${row(false,'存款强制弹窗','关闭')}${row(false,'彩金流水倍数','–')}
        ${row(false,'审核方式','自动审核')}${row(false,'领取方式','自动领取')}
        ${row(false,'已验证手机号','否')}${row(false,'限制使用设备','无限制')}
        ${row(false,'适用游戏范围',total?total+'个':'–')}
      </div>
      <div style="margin-top:8px;border-top:1px solid #f0f0f0;padding-top:8px;">${planRows}</div>`
    )}
    ${pRow('5','风控条件',
      `<div class="preview-grid">
        ${row(false,'同IP检测','关闭')}${row(false,'同姓名检测','关闭')}
        ${row(false,'同手机号检测','关闭')}${row(false,'同email检测','关闭')}
        ${row(false,'自动拒绝','–')}
      </div>`,
      true
    )}
  </div>`;
}

// ── game modal ───────────────────────────────────────────────────
function openModal() {
  tmpSel = {};
  GCATS.forEach((_,i) => { tmpSel[i] = new Set(confSel[i]||[]); });
  renderModalBody();
  $('gModal').classList.remove('hidden');
}
function renderModalBody() {
  const all = GCATS.reduce((a,c)=>a.concat(c.games),[]);
  const tot = Object.values(tmpSel).reduce((s,set)=>s+set.size,0);
  let h2 = `<div style="padding:10px 14px;border-bottom:1px solid #e8e8e8;background:#f9f9f9;display:flex;align-items:center;gap:10px;">
    <input type="checkbox" class="gck" id="allGames"${tot===all.length?' checked':''}> <span style="font-size:14px;font-weight:500;">全选</span></div>`;
  GCATS.forEach((c,ci) => {
    const sel = tmpSel[ci]||new Set();
    h2 += `<div class="gcat"><div class="gcath"><input type="checkbox" class="gck" data-ci="${ci}"${sel.size===c.games.length?' checked':''}><span>${c.cat}</span></div><div class="ggames">`;
    c.games.forEach(g => {
      h2 += `<label class="gi"><input type="checkbox" data-ci="${ci}" data-g="${g}"${sel.has(g)?' checked':''}>${g}</label>`;
    });
    h2 += `</div></div>`;
  });
  $('mbody').innerHTML = h2;
  $('allGames').addEventListener('change', function() {
    GCATS.forEach((_,i) => {
      if (!tmpSel[i]) tmpSel[i]=new Set();
      if (this.checked) GCATS[i].games.forEach(g=>tmpSel[i].add(g)); else tmpSel[i].clear();
    });
    renderModalBody();
  });
  $('mbody').querySelectorAll('input[data-ci][data-g]').forEach(cb => {
    cb.addEventListener('change', function() {
      const ci=+this.dataset.ci, g=this.dataset.g;
      if (!tmpSel[ci]) tmpSel[ci]=new Set();
      if (this.checked) tmpSel[ci].add(g); else tmpSel[ci].delete(g);
    });
  });
  $('mbody').querySelectorAll('input[data-ci]:not([data-g])').forEach(cb => {
    cb.addEventListener('change', function() {
      const ci=+this.dataset.ci;
      if (!tmpSel[ci]) tmpSel[ci]=new Set();
      if (this.checked) GCATS[ci].games.forEach(g=>tmpSel[ci].add(g)); else tmpSel[ci].clear();
      renderModalBody();
    });
  });
}
function closeModal() { $('gModal').classList.add('hidden'); }
function confirmModal() {
  GCATS.forEach((_,i) => { confSel[i]=new Set(tmpSel[i]||[]); });
  closeModal(); renderStep();
}
$('mclBtn').addEventListener('click', closeModal);
$('mCancel').addEventListener('click', closeModal);
$('mOk').addEventListener('click', confirmModal);

// ── agent modal ──────────────────────────────────────────────────
function openAgentModal() {
  tmpAgentLine = selAgentLine;
  renderAgentModalBody();
  $('agentModal').classList.remove('hidden');
}
function renderAgentModalBody() {
  let h2 = `<div class="agent-grid">`;
  AGENTS.forEach(ag => {
    const sel = tmpAgentLine === ag.v;
    h2 += `<div class="agent-item${sel?' sel':''}" data-agV="${ag.v}">
      <div class="agent-av" style="background:${ag.color};">${ag.l.slice(-1)}</div>
      <span class="agent-name">${ag.l}</span>
      ${sel ? '<span class="agent-sel-ck">✓ 已选择</span>' : ''}
    </div>`;
  });
  h2 += `</div>`;
  $('agMbody').innerHTML = h2;
  $('agMbody').querySelectorAll('[data-agV]').forEach(item => {
    item.addEventListener('click', () => {
      tmpAgentLine = item.dataset.agv;
      renderAgentModalBody();
    });
  });
}
function closeAgentModal() { $('agentModal').classList.add('hidden'); }
function confirmAgentModal() {
  selAgentLine = tmpAgentLine;
  closeAgentModal();
  renderStep();
  bindDrops();
  // re-check the line radio
  const lineRadio = $('sc') && $('sc').querySelector('input[name=agent][value="line"]');
  if (lineRadio) { lineRadio.checked = true; $('aLine') && $('aLine').classList.remove('hidden'); }
}
$('agMclBtn').addEventListener('click', closeAgentModal);
$('agCancel').addEventListener('click', closeAgentModal);
$('agOk').addEventListener('click', confirmAgentModal);

// ── init ─────────────────────────────────────────────────────────
goStep(1);
</script>
