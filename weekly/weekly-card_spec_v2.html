<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>周卡活动规格书 v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #f5f7fa;
  color: #333;
  font-family: 'PingFang SC','Microsoft YaHei',sans-serif;
  font-size: 14px;
  line-height: 1.6;
  padding: 32px 24px 64px;
}
.page { max-width: 1000px; margin: 0 auto; }

/* doc header */
.doc-header { background:#1677ff; border-radius:8px; padding:24px 28px; margin-bottom:20px; color:#fff; }
.doc-header h1 { font-size:20px; font-weight:700; margin-bottom:6px; }
.doc-header p { font-size:12px; opacity:.85; }
.meta-row { display:flex; gap:20px; margin-top:12px; font-size:12px; opacity:.85; flex-wrap:wrap; }
.meta-row span strong { opacity:1; font-weight:600; }

/* tabs */
.tab-bar {
  display: flex;
  gap: 6px;
  background: #fff;
  border: 1px solid #e8e8e8;
  border-radius: 8px;
  padding: 6px;
  margin-bottom: 24px;
  position: sticky;
  top: 16px;
  z-index: 10;
}
.tab-btn {
  flex: 1;
  text-align: center;
  padding: 10px 16px;
  font-size: 14px;
  font-weight: 600;
  color: #888;
  background: transparent;
  border: none;
  border-radius: 6px;
  cursor: pointer;
  transition: all .15s;
  font-family: inherit;
}
.tab-btn:hover { background: #f5f7fa; color: #555; }
.tab-btn.active { background: #1677ff; color: #fff; }

/* panels */
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* empty state placeholder */
.empty-state {
  background: #fff;
  border: 1px dashed #d9d9d9;
  border-radius: 10px;
  padding: 60px 24px;
  text-align: center;
  color: #999;
}
.empty-state .es-title { font-size: 15px; font-weight: 600; color: #666; margin-bottom: 8px; }
.empty-state .es-desc { font-size: 13px; color: #aaa; }

.doc-footer { text-align:center; font-size:12px; color:#bbb; margin-top:32px; }
</style>
</head>
<body>
<div class="page">

  <div class="doc-header">
    <h1>周卡活动规格书 v2</h1>
    <p>草稿新建，内容尚未填写</p>
    <div class="meta-row">
      <span><strong>版本</strong>：v2</span>
      <span><strong>日期</strong>：2026-07-23</span>
      <span><strong>撰写</strong>：PM</span>
      <span><strong>状态</strong>：待填写</span>
    </div>
  </div>

  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab('front', this)">前台规格</button>
    <button class="tab-btn" onclick="switchTab('back', this)">后台规格</button>
  </div>

  <!-- 前台 -->
  <div id="panel-front" class="tab-panel active">
    <div class="empty-state">
      <div class="es-title">前台规格</div>
      <div class="es-desc">内容待新增</div>
    </div>
  </div>

  <!-- 后台 -->
  <div id="panel-back" class="tab-panel">
    <div class="empty-state">
      <div class="es-title">后台规格</div>
      <div class="es-desc">内容待新增</div>
    </div>
  </div>

  <div class="doc-footer">周卡活动规格书 v2　·　2026-07-23</div>
</div>
<script>
function switchTab(name, btn) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  btn.classList.add('active');
}
</script>
</body>
</html>
