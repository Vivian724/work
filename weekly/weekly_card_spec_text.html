<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>OKBet Weekly Bonus Card — 规格书 v1</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0F1117;
  color: #CDD6F4;
  font-family: 'SF Mono', 'Cascadia Code', Menlo, 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.8;
  padding: 40px 24px 100px;
}
.wrap { max-width: 1080px; margin: 0 auto; }

/* topbar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px; padding-bottom: 16px;
  border-bottom: 1px solid #1E1E2E;
}
.topbar-title { font-size: 12px; color: #6C7086; }
.copy-btn {
  font-family: inherit; font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 6px; cursor: pointer;
  background: #1E1E2E; color: #CDD6F4; border: 1px solid #313244;
  transition: all .15s;
}
.copy-btn:hover { background: #313244; }
.copy-btn.ok { background: rgba(166,227,161,.12); color: #A6E3A1; border-color: rgba(166,227,161,.3); }

/* disclaimer */
.disclaimer {
  background: rgba(249,226,175,.06);
  border-left: 3px solid rgba(249,226,175,.5);
  padding: 10px 16px;
  border-radius: 0 6px 6px 0;
  margin-bottom: 40px;
  color: #F9E2AF;
  font-size: 12px;
  line-height: 1.7;
}

/* section row = iframe + spec text */
.s-row {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 36px;
  margin-bottom: 60px;
  align-items: start;
}
.s-row.full { grid-template-columns: 1fr; }

/* sticky phone */
.phone-wrap {
  position: sticky;
  top: 24px;
}
.phone-frame {
  background: #13131F;
  border-radius: 34px;
  border: 2px solid #2A2A3E;
  overflow: hidden;
  width: 340px;
  height: 680px;
  box-shadow: 0 12px 40px rgba(0,0,0,.6);
}
.phone-frame iframe {
  width: 390px;
  height: 780px;
  transform: scale(0.872);
  transform-origin: top left;
  border: none;
  display: block;
}
.phone-label {
  text-align: center;
  font-size: 11px;
  color: #585B70;
  margin-top: 10px;
  letter-spacing: .05em;
}

/* spec text block */
.spec-text { white-space: pre-wrap; word-break: break-word; }

/* syntax colors */
.t-h2   { color: #89B4FA; font-weight: 700; display: block; margin-bottom: 2px; }
.t-h3   { color: #89DCEB; font-weight: 600; display: block; margin-top: 14px; }
.t-note { color: #F9E2AF; display: block; }
.t-warn { color: #FAB387; display: block; }
.t-li   { color: #CDD6F4; display: block; }
.t-tbl  { color: #CDD6F4; display: block; }
.t-sep  { color: #313244; display: block; }
.t-ctx  { color: #7F849C; display: block; font-style: italic; }

/* Popup phone frames — shorter, scroll into popup area */
.phone-frame.popup {
  height: 480px;
  position: relative;
  overflow: hidden;
}
.phone-frame.popup iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 390px;
  height: 780px;
  transform: scale(0.872);
  transform-origin: top left;
  border: none;
  display: block;
}

/* divider */
.s-divider { border: none; border-top: 1px solid #1E1E2E; margin-bottom: 60px; }
</style>
</head>

<script>

  p6: `### 3-6  Rules Modal — Terms & Conditions

- 关闭：点击 X 或背景遮罩

  ⚠ 文案注意事项：以下两份内容独立，不可共用，请分别提供
  Terms & Conditions：点击「规则」按钮后弹出的 Modal 内文
  General Mechanics：购买页 / 领取页下方嵌入的区块说明文字`,

  p7: `### 3-7  Claim Popup（Bottom Sheet）
  玩家点击「Claim」按钮后从底部弹出，带背景遮罩，显示本次领取的奖励内容。

  rewards: `## 奖励数据表（演示数值，以后台设置为准）

};

// ── Renderer ──
function render(text) {
  return text.split('\n').map(line => {
    const esc = line
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
    if (/^## /.test(line))         return `<span class="t-h2">${esc}</span>`;
    if (/^### /.test(line))        return `<span class="t-h3">${esc}</span>`;
    if (/^&gt; /.test(esc))        return `<span class="t-note">${esc}</span>`;
    if (/⚠/.test(line))            return `<span class="t-warn">${esc}</span>`;
    if (/^- /.test(line))          return `<span class="t-li">${esc}</span>`;
    if (/^\|[-| ]+\|$/.test(line)) return `<span class="t-sep">${esc}</span>`;
    if (/^\|.+\|$/.test(line))     return `<span class="t-tbl">${esc}</span>`;
    if (/^  /.test(line) && line.trim()) return `<span class="t-ctx">${esc}</span>`;
    return esc;
  }).join('\n');
}

// Render all sections
[
  ['global','s-global'],['buy','s-buy'],['claim','s-claim'],
  ['popupHd','s-popup-hd'],
  ['p1','s-p1'],['p2','s-p2'],['p3','s-p3'],['p4','s-p4'],
  ['p5','s-p5'],['p6','s-p6'],['p7','s-p7'],['rewards','s-rewards']
].forEach(([key, id]) => {
  document.getElementById(id).innerHTML = render(SECTIONS[key]);
});

// ── Copy All ──
function copySpec() {
  const text = Object.values(SECTIONS).join('\n\n---\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy All'; btn.classList.remove('ok'); }, 2000);
  });
}
</script>
