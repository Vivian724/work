<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Bonus Pass — 规格书 v1</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0F1117;
  color: #CDD6F4;
  font-family: 'SF Mono', 'Cascadia Code', Menlo, 'Courier New', monospace;
  font-size: 13px;
  line-height: 1.8;
  padding: 40px 24px 100px;
}
.wrap { max-width: 1080px; margin: 0 auto; }

/* topbar */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 32px; padding-bottom: 16px;
  border-bottom: 1px solid #1E1E2E;
}
.topbar-title { font-size: 12px; color: #6C7086; }
.copy-btn {
  font-family: inherit; font-size: 12px; font-weight: 600;
  padding: 5px 14px; border-radius: 6px; cursor: pointer;
  background: #1E1E2E; color: #CDD6F4; border: 1px solid #313244;
  transition: all .15s;
}
.copy-btn:hover { background: #313244; }
.copy-btn.ok { background: rgba(166,227,161,.12); color: #A6E3A1; border-color: rgba(166,227,161,.3); }

/* disclaimer */
.disclaimer {
  background: rgba(249,226,175,.06);
  border-left: 3px solid rgba(249,226,175,.5);
  padding: 10px 16px;
  border-radius: 0 6px 6px 0;
  margin-bottom: 40px;
  color: #F9E2AF;
  font-size: 12px;
  line-height: 1.7;
}

/* section row = iframe + spec text */
.s-row {
  display: grid;
  grid-template-columns: 340px 1fr;
  gap: 36px;
  margin-bottom: 60px;
  align-items: start;
}
.s-row.full { grid-template-columns: 1fr; }

/* sticky phone */
.phone-wrap {
  position: sticky;
  top: 24px;
}
.phone-frame {
  background: #13131F;
  border-radius: 34px;
  border: 2px solid #2A2A3E;
  overflow: hidden;
  width: 340px;
  height: 680px;
  box-shadow: 0 12px 40px rgba(0,0,0,.6);
}
.phone-frame iframe {
  width: 390px;
  height: 780px;
  transform: scale(0.872);
  transform-origin: top left;
  border: none;
  display: block;
}
.phone-label {
  text-align: center;
  font-size: 11px;
  color: #585B70;
  margin-top: 10px;
  letter-spacing: .05em;
}

/* spec text block */
.spec-text { white-space: pre-wrap; word-break: break-word; }

/* syntax colors */
.t-h2   { color: #89B4FA; font-weight: 700; display: block; margin-bottom: 2px; }
.t-h3   { color: #89DCEB; font-weight: 600; display: block; margin-top: 14px; }
.t-note { color: #F9E2AF; display: block; }
.t-warn { color: #FAB387; display: block; }
.t-li   { color: #CDD6F4; display: block; }
.t-tbl  { color: #CDD6F4; display: block; }
.t-sep  { color: #313244; display: block; }
.t-ctx  { color: #7F849C; display: block; font-style: italic; }

/* Popup phone frames — shorter, scroll into popup area */
.phone-frame.popup {
  height: 480px;
  position: relative;
  overflow: hidden;
}
.phone-frame.popup iframe {
  position: absolute;
  top: 0;
  left: 0;
  width: 390px;
  height: 780px;
  transform: scale(0.872);
  transform-origin: top left;
  border: none;
  display: block;
}

/* divider */
.s-divider { border: none; border-top: 1px solid #1E1E2E; margin-bottom: 60px; }
</style>
</head>
<body>

  <div class="disclaimer">前台数据仅供演示，所有金额 / 条件 / 方案以后台设置为准。<br>视觉样式、文案、进度图表由 UI 设计出图。</div>

      </div>

    </div>
    <div>
      <div id="s-p1" class="spec-text"></div>

  </div>

  <!-- 3-2 提示 Banner -->
  <div class="s-row">
    <div class="phone-wrap">
      <div class="phone-frame popup">
        <iframe src="weekly-card-h5-v1.html?col=3" title="提示 Banner" style="top:230px"></iframe>
      </div>
      <div class="phone-label">3-2 提示 Banner</div>
    </div>
    <div>
      <div id="s-p2" class="spec-text"></div>
    </div>
  </div>

  <!-- 3-3 存款页面弹窗 -->
  <div class="s-row">
    <div class="phone-wrap">
      <div class="phone-frame popup">
        <iframe src="weekly-card-h5-v1.html?col=4" title="存款页面弹窗"></iframe>
      </div>
      <div class="phone-label">3-3 存款页面弹窗</div>
    </div>
    <div>
      <div id="s-p3" class="spec-text"></div>
    </div>
  </div>

  <!-- 3-4 Buy Confirm Modal -->
  <div class="s-row">
    <div class="phone-wrap">
      <div class="phone-frame popup" style="height:580px">
        <iframe src="weekly-card-h5-v1.html?col=0&modal=buy-mask" title="Buy Confirm Modal"></iframe>
      </div>
      <div class="phone-label">3-4 Buy Confirm Modal</div>
    </div>
    <div>
      <div id="s-p4" class="spec-text"></div>
    </div>
  </div>

  <!-- 3-5 Insufficient Balance Modal -->
  <div class="s-row">
    <div class="phone-wrap">
      <div class="phone-frame popup" style="height:520px">
        <iframe src="weekly-card-h5-v1.html?col=0&modal=balance-mask" title="Insufficient Balance Modal"></iframe>
      </div>
      <div class="phone-label">3-5 Insufficient Balance Modal</div>
    </div>
    <div>
      <div id="s-p5" class="spec-text"></div>
    </div>
  </div>

  <!-- 3-6 Rules Modal -->
  <div class="s-row">
    <div class="phone-wrap">
      <div class="phone-frame">
        <iframe src="weekly-card-h5-v1.html?col=0&modal=rules-mask" title="Rules Modal"></iframe>
      </div>
      <div class="phone-label">3-6 Rules Modal（T&amp;C）</div>
    </div>
    <div>
      <div id="s-p6" class="spec-text"></div>
    </div>
  </div>

  <!-- 3-7 Claim Popup -->
  <div class="s-row">
    <div class="phone-wrap">
      <div class="phone-frame">
        <iframe src="weekly-card-h5-v1.html?col=1&modal=claim-popup" title="Claim Popup"></iframe>
      </div>
      <div class="phone-label">3-7 Claim Popup</div>
    </div>

      <div id="s-p7" class="spec-text"></div>

  <hr class="s-divider">

  <!-- 奖励数据表 -->
  <div class="s-row full">
    <div id="s-rewards" class="spec-text"></div>
  </div>

</div>
<script>
const SECTIONS = {
  global: `## 全局规则

- 活动时间：所有时间显示读取后台活动时间配置
  备注：General Mechanics 规则第一点 — Event Period（时间展示读取后台活动时间配置，event period: TBD）
- 每周限购一张：7 天周期完全结束后才可重购
- 两种卡互斥：Elite Pass 与 Prime Pass，持有任一卡时另一张不可购买
- 每日重置：每日 00:00:00 AM 重置当日签到状态、任务与未领奖励，当天未领取即失效不补发
  同步重置：3-1 当日弹出状态 / 3-3「今日不再显示」状态
- 派发模式：后台设定「自动派发」或「手动领取」两种模式
- 弹窗显示优先顺序：每次仅显示最高优先级弹窗，前一条件未触发才依序进入下一层
  ① 21 岁验证弹窗
  ② KYC 弹窗
  ③ 首存系列弹窗
  ④ 活动弹窗（依各活动开发先后顺序排列）`,

  buy: `## 1. 购买页

⚠ 规格说明：时间显示读取后台活动时间配置
  备注：购买页上方 Banner 亦显示活动时间（读取后台活动时间配置）

  玩家通过活动入口进入此页面选购周卡。
  页面包含两张方案卡（Elite Pass / Prime Pass），点击切换后文案与价格同步更新。
  页面下方有 7 天奖励总预览，由上往下排列。
  右上角有「规则」侧边 Tab，点击弹出 Rules Modal。

  总预览奖励计算方式：
  - 彩金、积分：显示 7 天累计总数值
  - 旋转卷、免费投注、免费旋转、道具卡：显示 7 天累计总张数
  备注：后台未配置某奖励时，前台不显示该奖励项目

  ⚠ 注意：右上角「规则」弹窗内文为 Terms & Conditions，
     页面下方嵌入区块文案为 General Mechanics，两者独立，需分开提供。（详见 3-7）

### 情境 A｜会员尚未购买（首次进入）
- 进入活动入口 → 显示购买页
- 卡片名称固定为 Elite Pass 与 Prime Pass（写死，不可更改）
- 卡片价格由后台设定（动态读取）
- 点击 Elite Pass 或 Prime Pass Tab → 切换选中卡，价格即时更新
- 点击「Buy Now」→ 开启购买确认弹窗（3-5）
- 弹窗内确认购买 → 购买成功，关闭弹窗，直接跳转领取页

### 情境 B｜会员已购买（持卡中）
- 进入活动入口 → 直接跳转领取页，购买页不会显示
- 已购买会员不存在进入购买页的路径

### 情境 C｜点击「规则」
- 点击右上角规则侧边 Tab → 开启 Rules Modal（3-7）
- Rules Modal 内文为 T&C 条款，与页面下方 General Mechanics 文案不同`,

  claim: `## 2. 领取页

  购买成功后玩家的主要操作页面，显示 7 天进度。
  上方 Banner 样式依持有卡别不同而有所差异（Elite Pass / Prime Pass）。
  每一天包含两个奖励栏位：
  - 日常签到：每日登录即可触发（自动或手动，后台设定）
  - 额外奖励：需完成当日任务条件（存款或投注达标）才可领取
  视觉样式、文案、进度图表由 UI 设计出图。

  通则｜天数显示亮度
  当天卡片正常显示；其余天数（未到达 / 已完成）套用遮罩降低亮度。

- 玩家当日首次登录后，在当前所在页面自动弹出「登录自动派发弹窗」（3-1）
- 系统同步自动派发日常奖励
- 领取页日常签到栏显示 ✓，无按钮

### 情境 B｜日常签到 — 后台设置「手动领取」

- 领取完成 → 按钮改为「Claimed」disabled

### 情境 C｜额外奖励 — 按钮状态说明
  备注：按钮状态读取后台额外奖励条件逻辑
  备注：按钮状态仅显示于当天；过了 00:00:00，该天所有按钮消失，其余天数不显示按钮

  当天共四种按钮状态：

- 条件未达标，任务为投注 → 显示「Play Now」按钮，点击导至首页
- 条件已达标，尚未领取 → 显示「Claim」按钮，点击开启 Claim Popup（3-8）
- 已领取（手动领取或自动派发）→ 显示「Claimed」disabled

### 情境 D｜天数排列顺序（今日置顶）
  当日天数固定显示在最上方，其后依序为剩余天数，最后为已完成天数。
  示例：今日为 Day 4，列表排序为 Day 4 → Day 5 → Day 6 → Day 7 → Day 1 → Day 2 → Day 3`,

  popupHd: `## 3. 弹窗区

  本活动共涉及以下 7 个弹窗，依触发时机分别说明。`,

  p1: `### 3-1  登录自动派发弹窗
  后台设定「自动领取」时，玩家当日首次登录后触发此弹窗。
  仅在「首页」弹出；若玩家登录时所在页面为「我的」、「积分商城」或「排行榜」，则暂不弹出，

    · 任务为投注 → 显示「Play Now」按钮，点击导至首页`,

  p2: `### 3-2  提示 Banner

  p3: `### 3-3  存款页面弹窗

  p5: `### 3-5  Insufficient Funds Modal — 余额不足提示

  p6: `### 3-6  Rules Modal — Terms & Conditions

  p7: `### 3-7  Claim Popup（Bottom Sheet）

  rewards: `## 奖励数据表（演示数值，以后台设置为准）

// ── Renderer ──
function render(text) {
  return text.split('\n').map(line => {
    const esc = line
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;');
    if (/^## /.test(line))         return `<span class="t-h2">${esc}</span>`;
    if (/^### /.test(line))        return `<span class="t-h3">${esc}</span>`;
    if (/^&gt; /.test(esc))        return `<span class="t-note">${esc}</span>`;
    if (/⚠/.test(line))            return `<span class="t-warn">${esc}</span>`;
    if (/^- /.test(line))          return `<span class="t-li">${esc}</span>`;
    if (/^\|[-| ]+\|$/.test(line)) return `<span class="t-sep">${esc}</span>`;
    if (/^\|.+\|$/.test(line))     return `<span class="t-tbl">${esc}</span>`;
    if (/^  /.test(line) && line.trim()) return `<span class="t-ctx">${esc}</span>`;
    return esc;
  }).join('\n');
}

// Render all sections
[
  ['global','s-global'],['buy','s-buy'],['claim','s-claim'],
  ['popupHd','s-popup-hd'],
  ['p1','s-p1'],['p2','s-p2'],['p3','s-p3'],
  ['p4','s-p4'],['p5','s-p5'],['p6','s-p6'],['p7','s-p7'],['rewards','s-rewards']
].forEach(([key, id]) => {
  document.getElementById(id).innerHTML = render(SECTIONS[key]);
});

// ── Copy All ──
function copySpec() {
  const text = Object.values(SECTIONS).join('\n\n---\n\n');
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = '✓ Copied';
    btn.classList.add('ok');
    setTimeout(() => { btn.textContent = 'Copy All'; btn.classList.remove('ok'); }, 2000);
  });
}
